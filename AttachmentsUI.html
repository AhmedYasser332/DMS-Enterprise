<div id="attachments-view-template" style="display: none;">
  <div class="row mb-4 align-items-center">
    <div class="col-md-8 d-flex align-items-center">
      <button class="btn btn-outline-secondary me-3" id="backToRecordsBtn">
        <i class="fas fa-arrow-right"></i> عودة للسجلات
      </button>
      <div>
        <h4 class="m-0 text-dark" id="currentRecordTitle">المرفقات</h4>
        <small class="text-muted" id="parentGroupTitle"></small>
      </div>
    </div>
    <div class="col-md-4 text-end">
      <button class="btn btn-warning shadow-sm" data-bs-toggle="modal" data-bs-target="#uploadModal">
        <i class="fas fa-upload me-1"></i> رفع ملف جديد
      </button>
    </div>
  </div>

  <div class="row" id="attachmentsGrid"></div>

  <div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">رفع ملف جديد</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="currentRecIdUpload">
          <input type="hidden" id="currentGroupIdUpload">
          <input type="hidden" id="currentClientIdUpload">
          <input type="hidden" id="currentClientNameUpload">
          
          <div class="mb-3 text-center border p-4 bg-light rounded" id="dropZone" style="border: 2px dashed #ccc !important;">
            <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-2"></i>
            <p>اسحب وأفلت الملف هنا أو</p>
            <input class="form-control d-none" type="file" id="fileInput">
            <button class="btn btn-outline-primary" onclick="document.getElementById('fileInput').click()">اختر ملفاً</button>
            <p class="mt-2 text-primary" id="selectedFileName"></p>
          </div>
          
          <div class="progress d-none" id="uploadProgressContainer" style="height: 20px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" id="uploadProgressBar" role="progressbar" style="width: 0%;">0%</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="cancelUploadBtn">إلغاء</button>
          <button type="button" class="btn btn-warning" onclick="processFileUpload()" id="startUploadBtn">بدء الرفع</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function openAttachments(recordId, recordTitle, groupId, groupName, clientId, clientName) {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = document.getElementById('attachments-view-template').innerHTML;

    document.querySelector('#main-content #currentRecordTitle').textContent = `السجل: ${recordTitle}`;
    document.querySelector('#main-content #parentGroupTitle').textContent = `مجموعة البيانات: ${groupName}`;

    document.querySelector('#main-content #currentRecIdUpload').value = recordId;
    document.querySelector('#main-content #currentGroupIdUpload').value = groupId;
    document.querySelector('#main-content #currentClientIdUpload').value = clientId;
    document.querySelector('#main-content #currentClientNameUpload').value = clientName;

    document.querySelector('#main-content #backToRecordsBtn').onclick = function() {
      openRecords(groupId, groupName, clientId, clientName);
    };

    setupFileUploader();
    loadAttachments(recordId);
  }

  function loadAttachments(recordId) {
    const grid = document.querySelector('#main-content #attachmentsGrid');
    if(!grid) return;
    grid.innerHTML = '';

    // فلترة المرفقات من الميموري (الغير محذوفة والخاصة بالسجل ده)
    const files = (window.APP_STATE.attachments || []).filter(a => a.Record_ID === recordId && String(a.Is_Deleted).toUpperCase() !== "TRUE");

    if (files.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="fas fa-box-open fa-3x mb-3 d-block"></i>لا توجد مرفقات في هذا السجل.</div>';
      return;
    }

    files.forEach(function(file) {
      let icon = 'fa-file-alt';
      let ext = file.File_Name.split('.').pop().toLowerCase();
      if(['pdf'].includes(ext)) icon = 'fa-file-pdf text-danger';
      if(['jpg','jpeg','png','gif'].includes(ext)) icon = 'fa-file-image text-success';
      if(['doc','docx'].includes(ext)) icon = 'fa-file-word text-primary';
      if(['xls','xlsx'].includes(ext)) icon = 'fa-file-excel text-success';

      const col = document.createElement('div');
      col.className = 'col-md-4 col-lg-3 mb-4';
      col.innerHTML = `
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body text-center d-flex flex-column">
            <i class="fas ${icon} fa-4x mb-3"></i>
            <h6 class="card-title text-truncate" title="${file.File_Name}">${file.File_Name}</h6>
            <small class="text-muted mb-3 d-block">${file.Uploaded_At}</small>
            <div class="mt-auto">
              <a href="${file.Drive_URL}" target="_blank" class="btn btn-sm btn-outline-primary w-100 mb-2">
                <i class="fas fa-eye"></i> عرض / تحميل
              </a>
              <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteAttachmentHandler('${file.File_ID}', '${file.File_Name}', '${recordId}')">
                <i class="fas fa-trash"></i> حذف
              </button>
            </div>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  let selectedFileToUpload = null;
  function setupFileUploader() {
    const fileInput = document.querySelector('#main-content #fileInput');
    const displayLabel = document.querySelector('#main-content #selectedFileName');

    fileInput.addEventListener('change', function(e) {
      if(e.target.files.length > 0) {
        selectedFileToUpload = e.target.files[0];
        displayLabel.textContent = `تم اختيار: ${selectedFileToUpload.name}`;
      }
    });
  }

  function processFileUpload() {
    if(!selectedFileToUpload) {
      showError("تنبيه", "الرجاء اختيار ملف أولاً!");
      return;
    }

    if(selectedFileToUpload.size > 20 * 1024 * 1024) {
        showError("تنبيه", "حجم الملف كبير جداً. الحد الأقصى 20 ميجابايت.");
        return;
    }

    const recordId = document.querySelector('#main-content #currentRecIdUpload').value;
    const btn = document.querySelector('#main-content #startUploadBtn');
    const progressContainer = document.querySelector('#main-content #uploadProgressContainer');
    const progressBar = document.querySelector('#main-content #uploadProgressBar');

    btn.disabled = true;
    progressContainer.classList.remove('d-none');

    let fakeProgress = 10;
    progressBar.style.width = fakeProgress + '%';
    progressBar.textContent = fakeProgress + '%';
    const interval = setInterval(() => {
        if(fakeProgress < 90) {
            fakeProgress += 10;
            progressBar.style.width = fakeProgress + '%';
            progressBar.textContent = fakeProgress + '% (جاري الرفع)';
        }
    }, 500);

    const reader = new FileReader();
    reader.onload = function(e) {
      const base64Data = e.target.result.split(',')[1];
      const fileName = selectedFileToUpload.name;
      const mimeType = selectedFileToUpload.type || 'application/octet-stream';

      google.script.run
        .withSuccessHandler(function(res) {
          clearInterval(interval);
          progressBar.style.width = '100%';
          progressBar.textContent = '100% تم الرفع';

          setTimeout(() => {
            if(res.status === 'success') {
                // تحديث الميموري بعد الرفع
                google.script.run.withSuccessHandler(function(data) {
                    //window.APP_STATE = data.db; // تحديث الذاكرة
                    Object.assign(window.APP_STATE, data.db);
                    showSuccess('تم!', 'تم رفع الملف بنجاح.');

                    const modalInstance = bootstrap.Modal.getInstance(document.querySelector('#main-content #uploadModal'));
                    if (modalInstance) modalInstance.hide();
                    document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());

                    selectedFileToUpload = null;
                    document.querySelector('#main-content #selectedFileName').textContent = '';
                    document.querySelector('#main-content #fileInput').value = '';
                    btn.disabled = false;
                    progressContainer.classList.add('d-none');
                    progressBar.style.width = '0%';

                    loadAttachments(recordId); // تحديث الواجهة من الميموري
                }).getInitialAppData();
            } else {
                showError('خطأ', res.message);
                btn.disabled = false;
            }
          }, 1000);
        })
        .withFailureHandler(function(err) {
            clearInterval(interval);
            showError("خطأ في الاتصال", err.message);
            btn.disabled = false;
        })
        .uploadAttachment(recordId, fileName, base64Data, mimeType);
    };
    reader.readAsDataURL(selectedFileToUpload);
  }

  function deleteAttachmentHandler(fileId, fileName, recordId) {
      confirmAction(`هل أنت متأكد من حذف الملف "${fileName}"؟`, '<i class="fas fa-trash"></i> نعم، احذف الملف', () => {
        showLoader();
        google.script.run
          .withSuccessHandler(function(res) {
              if (res.status === 'success') {
                  // تحديث الميموري بعد الحذف
                  google.script.run.withSuccessHandler(function(data) {
                      hideLoader();
                      //window.APP_STATE = data.db;
                      Object.assign(window.APP_STATE, data.db);
                      showSuccess('تم!', 'تم حذف الملف بنجاح.');
                      loadAttachments(recordId);
                  }).getInitialAppData();
              } else {
                  hideLoader();
                  showError('خطأ', res.message);
              }
          })
          .withFailureHandler(function(err){
              hideLoader();
              showError('خطأ في الاتصال', err.message);
          })
          .deleteAttachment(fileId, fileName);
      });
  }
</script>
