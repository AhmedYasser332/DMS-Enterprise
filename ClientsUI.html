<div id="clients-view-template" style="display: none;">
  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h3 class="m-0 text-dark"><i class="fas fa-users me-2"></i> إدارة العملاء</h3>
    </div>
    <div class="col-md-6 text-end">
      <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addClientModal">
        <i class="fas fa-plus me-1"></i> إضافة عميل جديد
      </button>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="clientsTable">
          <thead class="table-light">
            <tr>
              <th>اسم العميل</th>
              <th>التسجيل الضريبي</th>
              <th>الكيان القانوني</th>
              <th>تاريخ الإضافة</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addClientModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">إضافة عميل جديد</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="newClientName" class="form-label fw-bold">اسم العميل</label>
            <input type="text" class="form-control" id="newClientName" placeholder="مثال: شركة الأهلي، محمد أحمد...">
          </div>
          <div class="mb-3">
            <label for="taxIdInput" class="form-label fw-bold">رقم التسجيل الضريبي</label>
            <input type="text" class="form-control" id="taxIdInput" placeholder="أدخل الرقم الضريبي">
          </div>
          <div class="mb-3">
            <label for="legalEntityInput" class="form-label fw-bold">الكيان القانوني</label>
            <div class="d-flex flex-column gap-2">
              <select class="form-select" id="legalEntityInput" onchange="toggleCustomEntity()">
                <option value="شركة مساهمة">شركة مساهمة</option>
                <option value="شركة ذات مسؤولية محدودة">شركة ذات مسؤولية محدودة</option>
                <option value="نشاط فردي">نشاط فردي</option>
                <option value="شركة تضامن">شركة تضامن</option>
                <option value="شركة توصية بسيطة">شركة توصية بسيطة</option>
                <option value="شركة توصية بالأسهم">شركة توصية بالأسهم</option>
                <option value="جمعيات">جمعيات</option>
                <option value="أخرى">أخرى (إضافة كيان جديد)...</option>
              </select>
              <input type="text" class="form-control d-none border-primary" id="customLegalEntity" placeholder="اكتب الكيان القانوني الجديد هنا...">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-primary" onclick="submitNewClient()">حفظ العميل</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // العرض بقى لحظي (من الميموري بدون الرجوع للسيرفر)
  function loadClients() {
    const tbody = document.querySelector('#main-content #clientsTable tbody');
    if(!tbody) return; 
    
    tbody.innerHTML = '';
    const clients = window.APP_STATE.clients || []; // ⚡ السحر هنا: بنقرأ من جيب المتصفح فوراً
    
    let uniqueEntities = new Set(["شركة مساهمة", "شركة ذات مسؤولية محدودة", "نشاط فردي", "شركة تضامن", "شركة توصية بسيطة", "شركة توصية بالأسهم", "جمعيات"]);
    
    clients.forEach(client => {
      if (client.Legal_Entity && client.Legal_Entity.trim() !== '' && client.Legal_Entity !== '-') {
        uniqueEntities.add(client.Legal_Entity.trim());
      }
    });
    
    const select = document.getElementById('legalEntityInput');
    if (select) {
      select.innerHTML = ''; 
      uniqueEntities.forEach(ent => {
        select.innerHTML += `<option value="${ent}">${ent}</option>`;
      });
      select.innerHTML += `<option value="أخرى">أخرى (إضافة كيان جديد)...</option>`;
    }
    
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4"><i class="fas fa-folder-open fa-2x mb-2 d-block"></i>لا يوجد عملاء حالياً.</td></tr>';
      return;
    }
    
    clients.forEach(function(client) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-bold text-primary">${client.Name}</td>
        <td>${client.Tax_ID || '-'}</td>
        <td><span class="badge bg-info text-dark">${client.Legal_Entity || '-'}</span></td>
        <td><small class="text-muted">${client.Created_At}</small></td>
        <td>
          <button class="btn btn-sm btn-outline-success me-1" onclick="openDataGroups('${client.Main_ID}', '${client.Name}')" title="فتح مجموعات البيانات">
            <i class="fas fa-folder-open"></i> فتح
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteClientHandler('${client.Main_ID}', '${client.Name}')" title="نقل إلى سلة المهملات">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function submitNewClient() {
    const name = document.getElementById('newClientName').value.trim();
    const taxId = document.getElementById('taxIdInput').value.trim();
    let legal = document.getElementById('legalEntityInput').value;
    
    if (legal === 'أخرى') {
      legal = document.getElementById('customLegalEntity').value.trim();
      if (!legal) { showError("تنبيه", "يرجى كتابة الكيان القانوني!"); return; }
    }
    if (!name) { showError("تنبيه", "اسم العميل مطلوب!"); return; }

    showLoader(); 
    google.script.run
      .withSuccessHandler((res) => {
        if(res && res.status === 'error') { hideLoader(); showError('خطأ', res.message); return; }
        
        // ⚡ بعد الإضافة بنجاح، نحدث الميموري من السيرفر عشان الداتا تفضل جديدة
        google.script.run.withSuccessHandler(function(data) {
          hideLoader();
          window.APP_STATE.clients = data.db.clients;
          updateDashboardStats();
          showSuccess('تم!', 'تم إضافة العميل بنجاح');
          
          const modalEl = document.getElementById('addClientModal');
          bootstrap.Modal.getInstance(modalEl).hide();
          document.getElementById('newClientName').value = '';
          document.getElementById('taxIdInput').value = '';
          loadClients();
        }).getInitialAppData();
      })
      .withFailureHandler((err) => { hideLoader(); showError('فشل الحفظ!', err.message); })
      .addClient(name, taxId, legal); 
  }

  function deleteClientHandler(id, name) {
    confirmAction(`هل تريد نقل العميل "${name}" إلى سلة المهملات؟`, '<i class="fas fa-trash"></i> نعم، انقل للسلة', () => {
      showLoader(); 
      google.script.run
        .withSuccessHandler((response) => {
          if (response.status === 'success') {
            // ⚡ تحديث الميموري بعد الحذف
            google.script.run.withSuccessHandler(function(data) {
              hideLoader();
              window.APP_STATE.clients = data.db.clients;
              updateDashboardStats();
              showSuccess('تم!', 'تم النقل لسلة المهملات.');
              loadClients(); 
            }).getInitialAppData();
          } else { hideLoader(); showError('خطأ!', response.message); }
        })
        .withFailureHandler((error) => { hideLoader(); showError('خطأ اتصال!', error.message); })
        .deleteClient(id, name); 
    });
  }

  function toggleCustomEntity() {
    const select = document.getElementById('legalEntityInput');
    const customInput = document.getElementById('customLegalEntity');
    if (select.value === 'أخرى') { customInput.classList.remove('d-none'); } 
    else { customInput.classList.add('d-none'); customInput.value = ''; }
  }
</script>
