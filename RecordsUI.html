<div id="records-view-template" style="display: none;">
  <div class="row mb-4 align-items-center">
    <div class="col-md-8 d-flex align-items-center">
      <button class="btn btn-outline-secondary me-3" id="backToGroupsBtn">
        <i class="fas fa-arrow-right"></i> عودة لمجموعات البيانات
      </button>
      <div>
        <h4 class="m-0 text-dark" id="currentGroupTitle">السجلات</h4>
        <small class="text-muted" id="parentClientTitle"></small>
      </div>
    </div>
    <div class="col-md-4 text-end">
      <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addRecordModal">
        <i class="fas fa-plus me-1"></i> إضافة سجل جديد
      </button>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="recordsTable">
          <thead class="table-light">
            <tr>
              <th>عنوان السجل</th>
              <th>الوسوم</th>
              <th>تاريخ الإنشاء</th>
              <th>بواسطة</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addRecordModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">إضافة سجل جديد</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="currentGroupIdInput">
          <input type="hidden" id="currentClientIdInputRec">
          <input type="hidden" id="currentClientNameInputRec">
          
          <div class="mb-3">
            <label for="recordTitle" class="form-label fw-bold">عنوان السجل</label>
            <input type="text" class="form-control" id="recordTitle" placeholder="مثال: ملفات قضية رقم 123">
          </div>
          <div class="mb-3">
            <label for="recordDesc" class="form-label fw-bold">وصف مختصر</label>
            <textarea class="form-control" id="recordDesc" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label for="recordTags" class="form-label fw-bold">الوسوم (مفصولة بفاصلة)</label>
            <input type="text" class="form-control" id="recordTags" placeholder="مثال: قضايا، عاجل، محكمة">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-success" onclick="submitNewRecord()">حفظ السجل</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function openRecords(groupId, groupName, clientId, clientName) {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = document.getElementById('records-view-template').innerHTML;
    
    document.querySelector('#main-content #currentGroupTitle').textContent = `السجلات: ${groupName}`;
    document.querySelector('#main-content #parentClientTitle').textContent = `العميل: ${clientName}`;
    
    document.querySelector('#main-content #currentGroupIdInput').value = groupId;
    document.querySelector('#main-content #currentClientIdInputRec').value = clientId;
    document.querySelector('#main-content #currentClientNameInputRec').value = clientName;
    
    document.querySelector('#main-content #backToGroupsBtn').onclick = function() {
      openDataGroups(clientId, clientName);
    };
    
    loadRecords(groupId, groupName, clientId, clientName);
  }

  function loadRecords(groupId, groupName, clientId, clientName) {
    const tbody = document.querySelector('#main-content #recordsTable tbody');
    if (!tbody) return;

    tbody.innerHTML = '';
    // ⚡ السحر هنا: فلترة السجلات لحظياً من الميموري (بناءً على Sub_ID)
    const records = (window.APP_STATE.records || []).filter(r => r.Sub_ID === groupId);
    
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4"><i class="fas fa-file-alt fa-2x mb-2 d-block"></i>لا توجد سجلات في هذه المجموعة.</td></tr>';
      return;
    }
    
    records.forEach(function(rec) {
      const tr = document.createElement('tr');
      const tagsHtml = rec.Tags ? rec.Tags.split(',').map(t => `<span class="badge bg-light text-dark border me-1">${t.trim()}</span>`).join('') : '<small class="text-muted">لا يوجد</small>';

      tr.innerHTML = `
        <td>
          <div class="fw-bold text-success">${rec.Title}</div>
          <small class="text-muted">${rec.Description || ''}</small>
        </td>
        <td>${tagsHtml}</td>
        <td><span class="badge bg-light text-dark border">${rec.Created_At}</span></td>
        <td>${rec.Created_By.split('@')[0]}</td>
        <td>
          <button class="btn btn-sm btn-primary me-1 shadow-sm" onclick="openAttachments('${rec.Record_ID}', '${rec.Title}', '${groupId}', '${groupName}', '${clientId}', '${clientName}')" title="إدارة المرفقات">
            <i class="fas fa-paperclip"></i> المرفقات
          </button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="deleteRecordHandler('${rec.Record_ID}', '${rec.Title}', '${groupId}', '${groupName}', '${clientId}', '${clientName}')" title="نقل إلى سلة المهملات">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function submitNewRecord() {
    const groupId = document.querySelector('#main-content #currentGroupIdInput').value;
    const clientId = document.querySelector('#main-content #currentClientIdInputRec').value;
    const clientName = document.querySelector('#main-content #currentClientNameInputRec').value;
    const groupName = document.querySelector('#main-content #currentGroupTitle').textContent.replace('السجلات: ', '');
    
    const titleInput = document.querySelector('#main-content #recordTitle');
    const descInput = document.querySelector('#main-content #recordDesc');
    const tagsInput = document.querySelector('#main-content #recordTags');

    const title = titleInput.value.trim();
    const desc = descInput.value.trim();
    const tags = tagsInput.value.trim();

    if (!title) { showError('تنبيه', 'يرجى إدخال عنوان السجل!'); return; }
    showLoader();

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.status === 'error') { hideLoader(); showError('خطأ', res.message); return; }
        
        // ⚡ تحديث الميموري
        google.script.run.withSuccessHandler(function(data) {
          hideLoader();
          window.APP_STATE.records = data.db.records;
          updateDashboardStats();
          showSuccess('تم!', 'تم إضافة السجل بنجاح.');

          const modalInstance = bootstrap.Modal.getInstance(document.querySelector('#main-content #addRecordModal'));
          if (modalInstance) modalInstance.hide();
          titleInput.value = ''; descInput.value = ''; tagsInput.value = '';
          
          loadRecords(groupId, groupName, clientId, clientName);
        }).getInitialAppData();
      })
      .withFailureHandler(function(error) { hideLoader(); showError('فشل الاتصال!', error.message); })
      .addRecord(groupId, title, desc, tags);
  }

  function deleteRecordHandler(id, title, groupId, groupName, clientId, clientName) {
    confirmAction(`هل تريد نقل السجل "${title}" إلى سلة المهملات؟`, '<i class="fas fa-trash"></i> نعم، انقل للسلة', () => {
        showLoader();
        google.script.run
          .withSuccessHandler(function(response) {
            if (response && response.status === 'success') {
              // ⚡ تحديث الميموري
              google.script.run.withSuccessHandler(function(data) {
                hideLoader();
                window.APP_STATE.records = data.db.records;
                updateDashboardStats();
                showSuccess('تم!', 'تم نقل السجل إلى سلة المهملات بنجاح.');
                loadRecords(groupId, groupName, clientId, clientName);
              }).getInitialAppData();
            } else { hideLoader(); showError('خطأ!', response.message); }
          })
          .withFailureHandler(function(error) { hideLoader(); showError('فشل الاتصال!', error.message); })
          .deleteRecord(id, title);
      }
    );
  }
</script>
