<div id="users-view-template" style="display: none;">
  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h3 class="m-0 text-dark"><i class="fas fa-user-shield me-2"></i> إدارة المستخدمين</h3>
    </div>
    <div class="col-md-6 text-end">
      <button class="btn btn-warning shadow-sm" data-bs-toggle="modal" data-bs-target="#addUserModal" onclick="populateClientDropdown()">
        <i class="fas fa-user-plus me-1"></i> إضافة مستخدم جديد
      </button>
    </div>
  </div>
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="usersTable">
          <thead class="table-light">
            <tr>
              <th>الاسم / اسم الدخول</th>
              <th>الصلاحية</th>
              <th>العملاء المتاحين</th>
              <th>تاريخ الإنشاء</th>
              <th>الحالة</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">إضافة مستخدم جديد</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-bold">الاسم بالكامل</label>
            <input type="text" id="newUserName" class="form-control">
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">اسم الدخول</label>
              <input type="text" id="newUserLogin" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">كلمة المرور</label>
              <input type="password" id="newUserPass" class="form-control">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">نوع الصلاحية</label>
            <select id="newUserRole" class="form-select">
              <option value="Admin">مدير نظام (Admin)</option>
              <option value="User" selected>مستخدم عادي (User)</option>
              <option value="Viewer">مشاهد فقط (Viewer)</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">العميل المسموح به</label>
            <select id="newUserClients" class="form-select">
               <option value="ALL">كل العملاء (ALL)</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-warning" onclick="submitNewUser()">حفظ المستخدم</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function populateClientDropdown() {
    const select = document.getElementById('newUserClients');
    select.innerHTML = '<option value="ALL">كل العملاء (ALL)</option>';
    const clients = (window.APP_STATE.clients || []).filter(c => String(c.Is_Deleted).toUpperCase() !== "TRUE");
    clients.forEach(c => { select.innerHTML += `<option value="${c.Main_ID}">${c.Name}</option>`; });
  }

  function loadUsers() {
    const tbody = document.querySelector('#main-content #usersTable tbody');
    if(!tbody) return;
    tbody.innerHTML = '';
    const users = (window.APP_STATE.users || []).filter(u => !u.isDeleted);
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">لا يوجد مستخدمين.</td></tr>';
      return;
    }
    users.forEach(function(u) {
      const tr = document.createElement('tr');
      let roleBadge = u.role === 'Admin' ? '<span class="badge bg-danger">مدير</span>' : (u.role === 'User' ? '<span class="badge bg-primary">مستخدم</span>' : '<span class="badge bg-secondary">مشاهد</span>');
      const statusBadge = u.isActive ? '<span class="badge bg-success">نشط</span>' : '<span class="badge bg-warning text-dark">معطل</span>';
      const isMe = (window.APP_STATE.currentUser.username === u.username);
      const toggleBtn = u.isActive ? `<button class="btn btn-sm btn-warning text-dark me-1" onclick="toggleUser('${u.id}', true)"><i class="fas fa-ban"></i></button>` : `<button class="btn btn-sm btn-success me-1" onclick="toggleUser('${u.id}', false)"><i class="fas fa-check"></i></button>`;
      
      tr.innerHTML = `<td><div class="fw-bold">${u.name}</div><small>@${u.username}</small></td>
        <td>${roleBadge}</td><td><small>${u.allowedClients}</small></td>
        <td><small>${u.createdAt}</small></td><td>${statusBadge}</td>
        <td>${isMe ? '<small class="fw-bold text-success">أنت</small>' : toggleBtn + ' <button class="btn btn-sm btn-danger" onclick="deleteUserHandler(\''+u.id+'\', \''+u.username+'\')"><i class="fas fa-trash"></i></button>'}</td>`;
      tbody.appendChild(tr);
    });
  }

  function submitNewUser() {
    const name = document.getElementById('newUserName').value.trim();
    const username = document.getElementById('newUserLogin').value.trim();
    const pass = document.getElementById('newUserPass').value.trim();
    const role = document.getElementById('newUserRole').value;
    const clients = document.getElementById('newUserClients').value;

    if(!name || !username || !pass) { showError("تنبيه", "يرجى تعبئة كل الخانات"); return; }
    showLoader();
    google.script.run.withSuccessHandler(function(res) {
      if(res.status === 'success') {
        google.script.run.withSuccessHandler(function(data) {
          hideLoader(); 
          Object.assign(window.APP_STATE, data.db); // ⚡ الإصلاح السحري: دمج بدون مسح بيانات الدخول
          updateDashboardStats();
          bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
          loadUsers(); showSuccess("تم", "تم إضافة المستخدم");
        }).getInitialAppData(window.APP_STATE.currentUser.role);
      } else { hideLoader(); showError("خطأ", res.message); }
    }).addNewUser(name, username, pass, role, clients);
  }

  function toggleUser(id, currentStatus) {
    confirmAction(`تغيير حالة الحساب؟`, `نعم`, () => {
      showLoader();
      google.script.run.withSuccessHandler(function(res){
        if(res.status === 'success') {
          google.script.run.withSuccessHandler(function(data) { 
            hideLoader(); 
            Object.assign(window.APP_STATE, data.db); // ⚡ دمج بدون مسح
            loadUsers(); 
          }).getInitialAppData(window.APP_STATE.currentUser.role);
        } else { hideLoader(); showError("خطأ", res.message); }
      }).toggleUserStatus(id, currentStatus);
    });
  }

  function deleteUserHandler(id, username) {
    confirmAction(`حذف المستخدم نهائياً؟`, 'احذف', () => {
      showLoader();
      google.script.run.withSuccessHandler(function(res){
        if(res.status === 'success') {
          google.script.run.withSuccessHandler(function(data) { 
            hideLoader(); 
            Object.assign(window.APP_STATE, data.db); // ⚡ دمج بدون مسح
            updateDashboardStats(); 
            loadUsers(); 
          }).getInitialAppData(window.APP_STATE.currentUser.role);
        } else { hideLoader(); showError("خطأ", res.message); }
      }).deleteUserAccount(id, username);
    });
  }
</script>
