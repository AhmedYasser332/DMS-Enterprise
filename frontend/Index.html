    /* ========================================= */
    /* 🎨 Enterprise SaaS & Modern UI System */
    /* ========================================= */
    :root {
      --primary-color: #2563EB;
      --primary-hover: #1D4ED8;
      --app-bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bs-primary: #2563EB;
      --bs-primary-rgb: 37, 99, 235;
    }

    [data-bs-theme="dark"] {
      --primary-color: #3B82F6;
      --primary-hover: #60A5FA;
      --app-bg: #0F172A;
      --card-bg: #1E293B;
      --glass-bg: rgba(30, 41, 59, 0.75);
      --glass-border: rgba(255, 255, 255, 0.05);
      --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --bs-body-color: var(--text-main);
      --bs-secondary-color: var(--text-muted);
      --bs-primary: #3B82F6;
      --bs-primary-rgb: 59, 130, 246;
      --bs-body-bg: #0F172A;
    }

    body {
      font-family: 'Tajawal', 'Cairo', sans-serif;
      background-color: var(--app-bg);
      color: var(--text-main);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .text-primary {
      color: var(--primary-color) !important;
    }

    .bg-primary {
      background-color: var(--primary-color) !important;
    }

    .btn-primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Navbar */
    .navbar {
      background: var(--card-bg) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    /* Cards */
    .card,
    .modal-content {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    /* Sidebar */
    .list-group {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 12px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .list-group-item {
      border: none;
      margin-bottom: 8px;
      border-radius: 12px !important;
      font-weight: 600;
      color: var(--text-muted);
      background-color: transparent;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      padding: 12px 15px;
    }

    .list-group-item:hover {
      transform: translateX(-4px);
      background-color: rgba(var(--bs-primary-rgb), 0.08);
      color: var(--primary-color);
    }

    .list-group-item.active {
      background-color: var(--primary-color) !important;
      color: white !important;
      box-shadow: 0 8px 20px rgba(var(--bs-primary-rgb), 0.3);
    }

    /* Tables */
    .table {
      border-collapse: collapse;
      margin-top: 0;
    }

    .table thead th {
      border: none;
      font-weight: 700;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 12px 16px;
      background-color: rgba(0, 0, 0, 0.02);
      border-bottom: 2px solid var(--glass-border);
    }

    [data-bs-theme="dark"] .table thead th {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .table tbody tr {
      background: transparent;
      transition: all 0.2s ease;
      border-bottom: 1px solid var(--glass-border);
    }

    .table tbody tr:hover {
      background-color: rgba(var(--bs-primary-rgb), 0.04);
    }

    [data-bs-theme="dark"] .table tbody tr:hover {
      background-color: rgba(var(--bs-primary-rgb), 0.1);
    }

    .table tbody td {
      border: none;
      vertical-align: middle;
      padding: 16px;
      color: var(--text-main);
    }

    /* Buttons */
    .btn {
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 0.5rem 1.25rem;
    }

    .btn-sm {
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(var(--bs-primary-rgb), 0.2);
    }

    /* Input Fields */
    .form-control,
    .form-select {
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1rem;
      background-color: var(--app-bg);
      color: var(--text-main);
      transition: all 0.3s ease;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.25);
    }
  </style>
</head>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

      html.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('dms_theme', newTheme);

      const icon = document.querySelector('#darkModeToggle i');
      if (newTheme === 'dark') {
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    }

    // تطبيق الثيم المحفوظ أول ما تفتح الموقع
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('dms_theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', savedTheme);
      const icon = document.querySelector('#darkModeToggle i');
      if (savedTheme === 'dark' && icon) {
        icon.classList.replace('fa-moon', 'fa-sun');
      }
    });
  </script>
