  <style>
    /* ========================================= */
    /* 🎨 تحسينات الـ UI لراحة العين (Soft Design) */
    /* ========================================= */
    body {
      font-family: 'Cairo', sans-serif; /* الخط الجديد */
      background-color: var(--bs-body-bg);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* تجميل الشريط العلوي (Navbar) بتدرج لوني هادئ */
    .navbar {
      background: linear-gradient(135deg, #2c3e50, #3498db) !important;
      border-bottom: 3px solid rgba(255,255,255,0.05);
    }

    /* تجميل الكروت (Cards) */
    .card {
      border-radius: 12px;
      border: 1px solid var(--bs-border-color-translucent);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }

    /* تجميل القائمة الجانبية (Sidebar) */
    .list-group-item {
      border: none;
      margin-bottom: 8px;
      border-radius: 8px !important;
      font-weight: 600;
      color: var(--bs-secondary-color);
      background-color: transparent;
      transition: all 0.2s ease;
    }
    .list-group-item:hover {
      background-color: var(--bs-secondary-bg);
      transform: translateX(-5px);
    }
    .list-group-item.active {
      background-color: #3498db !important;
      color: white !important;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }

    /* تجميل الجداول (Modern Floating Tables) */
    .table { border-collapse: separate; border-spacing: 0 8px; margin-top: -8px; }
    .table thead th { border: none; font-weight: 700; color: var(--bs-secondary-color); background: transparent; }
    .table tbody tr {
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      border-radius: 8px;
      background-color: var(--bs-body-bg);
      transition: transform 0.1s;
    }
    .table tbody tr:hover { transform: scale(1.01); z-index: 1; position: relative; }
    .table tbody td { border: none; vertical-align: middle; }
    .table tbody td:first-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
    .table tbody td:last-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
  </style>
</head>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('dms_theme', newTheme);
      
      const icon = document.querySelector('#darkModeToggle i');
      if (newTheme === 'dark') {
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    }

    // تطبيق الثيم المحفوظ أول ما تفتح الموقع
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('dms_theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', savedTheme);
      const icon = document.querySelector('#darkModeToggle i');
      if (savedTheme === 'dark' && icon) {
        icon.classList.replace('fa-moon', 'fa-sun');
      }
    });
  </script>
