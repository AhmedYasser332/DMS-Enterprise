<script>
  /**
   * TaskUtils — Shared Task Utility (Single Source of Truth)
   * Eliminates DRY violations between MyTasksController & TaskAdminController.
   * Defines all task status constants and the shared urgency calculation.
   */
  const TaskUtils = Object.freeze({
    ACTIVE_STATUSES:  Object.freeze(['Pending', 'Needs_Review', 'Overdue']),
    ARCHIVE_STATUSES: Object.freeze(['Completed']),

    isActive(task)   { return this.ACTIVE_STATUSES.includes(task.Status); },
    isArchived(task) { return this.ARCHIVE_STATUSES.includes(task.Status); },

    /**
     * Calculates a task's urgency label, CSS class, and icon for display.
     * @param {object} task - A task object from the GlobalStore.
     * @returns {{ label: string, cssClass: string, icon: string, daysLeft?: number }}
     */
    getUrgency(task) {
      if (task.Status === 'Completed')    return { label: 'مكتملة',               cssClass: 'bg-success',          icon: 'fa-check-circle' };
      if (task.Status === 'Needs_Review') return { label: 'بانتظار المراجعة',    cssClass: 'bg-info',             icon: 'fa-hourglass-half' };

      const dl = new Date(task.Deadline);
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      dl.setHours(0, 0, 0, 0);

      if (isNaN(dl.getTime())) return { label: 'غير محدد', cssClass: 'bg-secondary', icon: 'fa-question-circle' };

      const days = Math.ceil((dl - now) / 86400000);
      const c = parseInt(task.Critical_Days) || 1;
      const w = parseInt(task.Warning_Days)  || 3;

      if (days < 0)   return { label: 'متأخرة ('  + Math.abs(days) + ' يوم)', cssClass: 'bg-danger',              icon: 'fa-times-circle',       daysLeft: days };
      if (days === 0) return { label: 'اليوم آخر موعد!',                       cssClass: 'bg-danger',              icon: 'fa-fire',               daysLeft: 0    };
      if (days <= c)  return { label: 'حرجة ('    + days + ' يوم)',             cssClass: 'bg-danger',              icon: 'fa-fire',               daysLeft: days };
      if (days <= w)  return { label: 'تحذير ('   + days + ' يوم)',             cssClass: 'bg-warning text-dark',   icon: 'fa-exclamation-triangle',daysLeft: days };
      return                  { label: 'باقي '    + days + ' يوم',              cssClass: 'bg-primary',             icon: 'fa-clock',              daysLeft: days };
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  /**
   * App / Main Application Controller (Refactored Clean Code)
   */
  class App {

    static boot() {
      const session = localStorage.getItem('dms_session');
      this.initKeyboardNavigation();
      if (session) this.initUserSession(JSON.parse(session));
      else this.showLoginScreen();
    }

    static showLoginScreen() {
      document.getElementById('app-wrapper').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    static async initUserSession(user) {
      GlobalStore.setState({ currentUser: user });
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-wrapper').style.display = 'block';

      const userNameElement = document.getElementById('userDisplayName');
      if (userNameElement) userNameElement.textContent = 'مرحباً، ' + user.name;

      this.applyPermissions();

      GlobalStore.subscribe(state => this.updateNotificationBadge(state.unreadCount));

      await this.loadInitialData();
    }

    static async loadInitialData() {
      const currentUser = GlobalStore.getState().currentUser;
      
      const savedPage = sessionStorage.getItem('dms_current_page');
      const savedParamRaw = sessionStorage.getItem('dms_current_param');
      let savedParam = null;
      if (savedParamRaw) {
        try { savedParam = JSON.parse(savedParamRaw); } catch(e) { savedParam = savedParamRaw; }
      }
      
      // Navigate immediately to show Skeleton Screens
      if (savedPage && this.ROUTES[savedPage]) {
        this.navigate(savedPage, savedParam);
      } else {
        if (currentUser.role === this.ROLES.ADMIN) {
          this.navigate('dashboard');
        } else {
          this.navigate('my-tasks');
        }
      }

      // إظهار شاشة تحميل واضحة فوق الـ Skeletons للمستخدم
      UIManager.showLoader("جاري تحميل النظام والبيانات...");

      // Fetch data in the background
      try {
        const initialAppData = await ApiClient.call('api_getInitialAppData', currentUser.username);
        GlobalStore.setState({
          isLoadingInitialData: false, // Turn off skeletons
          clients: initialAppData.clients, groups: initialAppData.groups,
          records: initialAppData.records, attachments: initialAppData.attachments, users: initialAppData.users || [],
          tags: initialAppData.tags || [], legalEntities: initialAppData.legalEntities || [],
          tasks: initialAppData.tasks || [], taskTemplates: initialAppData.taskTemplates || [],
          taxConfig: initialAppData.taxConfig || [], credentials: initialAppData.credentials || []
        });
        
        this.navigate(this.currentPage, this.currentParam);
        UIManager.hideLoader();

        // Fallback polling for idle users
        this.startHeartbeatPolling();

      } catch (error) {
        UIManager.hideLoader();
        UIManager.showError(error.message, "فشل في تحميل البيانات");
      }
    }



    static navigate(pageId, param = null) {
      // 1. History Management for Arrow Keys
      if (!this.isNavigatingFromHistory) {
        if (this.historyIndex < this.history.length - 1) {
          this.history = this.history.slice(0, this.historyIndex + 1);
        }
        const current = this.history[this.historyIndex];
        if (!current || current.pageId !== pageId || JSON.stringify(current.param) !== JSON.stringify(param)) {
          this.history.push({ pageId, param });
          if (this.history.length > 33) {
            this.history.shift();
          } else {
            this.historyIndex++;
          }
        }
      }

      this.currentPage = pageId;
      this.currentParam = param;
      
      sessionStorage.setItem('dms_current_page', pageId);
      if (param !== null && param !== undefined) {
        sessionStorage.setItem('dms_current_param', JSON.stringify(param));
      } else {
        sessionStorage.removeItem('dms_current_param');
      }

      const state = GlobalStore.getState();
      const currentUser = state.currentUser;
      const role = currentUser ? currentUser.role : '';
      const perms = currentUser ? (currentUser.permissions || {}) : {};
      const route = this.ROUTES[pageId];

      if (route?.restricted && role !== this.ROLES.ADMIN) {
        let allowed = false;
        if (pageId === 'users' && perms.admin?.manageUsers) allowed = true;
        if (pageId === 'logs' && perms.admin?.viewLogs) allowed = true;
        if (pageId === 'trash' && perms.recycleBin?.view) allowed = true;
        if (pageId === 'dashboard' && perms.dashboard?.view) allowed = true;
        if (pageId === 'tasks-admin') allowed = false; // Tasks Admin is strictly Admin-only

        if (!allowed) {
          UIManager.showError("ليس لديك صلاحية لدخول هذه الصفحة", "دخول مرفوض");
          this.navigate('my-tasks');
          return;
        }
      }

      document.querySelectorAll('.list-group-item').forEach(item => item.classList.remove('active'));
      const link = document.querySelector(`a[onclick*="App.navigate('${pageId}')"]`);
      if (link) link.classList.add('active');

      const mainContent = document.getElementById('main-content');
      if (!mainContent) return;

      if (route) {
        if (state.isLoadingInitialData) {
          mainContent.innerHTML = `
            <div class="p-4 fade-in">
               <div class="skeleton-box skeleton-header"></div>
               <div class="row">
                 <div class="col-md-4"><div class="skeleton-box skeleton-card"></div></div>
                 <div class="col-md-4"><div class="skeleton-box skeleton-card"></div></div>
                 <div class="col-md-4"><div class="skeleton-box skeleton-card"></div></div>
               </div>
               <div class="skeleton-box skeleton-row mt-4"></div>
               <div class="skeleton-box skeleton-row"></div>
               <div class="skeleton-box skeleton-row"></div>
               <div class="skeleton-box skeleton-row"></div>
               <div class="skeleton-box skeleton-row"></div>
            </div>
          `;
        } else {
          mainContent.innerHTML = document.getElementById(route.template).innerHTML;
          // ⚡ الإصلاح السحري: استدعاء الكنترولر من نافذة المتصفح الحالية وقت التشغيل
          if (route.controllerName) {
            try {
              new Function('param', `return ${route.controllerName}.${route.method}(param)`)(param);
            } catch (e) {
              console.error("Routing error:", e);
            }
          }
        }
      } else {
        mainContent.innerHTML = `<div class="text-center mt-5"><h3 class="text-muted">صفحة ${pageId} قيد التطوير...</h3></div>`;
      }

      this.applyPermissions();
    }

    static applyPermissions() {
      const state = GlobalStore.getState();
      if (!state.currentUser) return;

      const { role, permissions: perms = {} } = state.currentUser;

      // 1. Control Admin Tools Toggle (Group Visibility)
      const adminWrapper = document.getElementById('adminToolsWrapper');
      if (adminWrapper) {
        const hasAnyAdminAccess = (role === this.ROLES.ADMIN || 
                                 perms.admin?.manageUsers || 
                                 perms.admin?.viewLogs || 
                                 perms.recycleBin?.view);
        adminWrapper.style.setProperty('display', hasAnyAdminAccess ? 'block' : 'none', 'important');
      }

      // 2. Control individual links visibility for fine-grained access
      const visibilityMap = {
        'dashboard': (role === this.ROLES.ADMIN || perms.dashboard?.view),
        'users': (role === this.ROLES.ADMIN || perms.admin?.manageUsers),
        'logs': (role === this.ROLES.ADMIN || perms.admin?.viewLogs),
        'trash': (role === this.ROLES.ADMIN || perms.recycleBin?.view),
        'tasks-admin': (role === this.ROLES.ADMIN)
      };

      Object.entries(visibilityMap).forEach(([key, isVisible]) => {
        const el = document.querySelector(`a[onclick*="${key}"]`);
        if (el) el.style.setProperty('display', isVisible ? 'block' : 'none', 'important');
      });

      // 3. Viewer-only restrictions
      if (role === this.ROLES.VIEWER) {
        document.querySelectorAll('#app-wrapper .btn-success, #app-wrapper .btn-danger, #app-wrapper .btn-warning').forEach(btn => {
          const isAction = btn.getAttribute('onclick') && (btn.getAttribute('onclick').includes('add') || btn.getAttribute('onclick').includes('delete'));
          if (isAction) btn.style.setProperty('display', 'none', 'important');
        });
      }
    }

    static logout() {
      localStorage.removeItem('dms_session');
      sessionStorage.removeItem('dms_current_page');
      sessionStorage.removeItem('dms_current_param');
      GlobalStore.clearState();
      document.getElementById('app-wrapper').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('main-content').innerHTML = '<h3 class="text-center text-muted mt-5">جاري التحميل...</h3>';
      Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'تم تسجيل الخروج', showConfirmButton: false, timer: 1500 });
    }

    static async openFeedbackModal() {
      const { value: message } = await Swal.fire({
        title: 'إبلاغ عن مشكلة / اقتراح',
        input: 'textarea',
        inputLabel: 'الرجاء كتابة تفاصيل المشكلة أو الاقتراح لتطوير النظام:',
        inputPlaceholder: 'اكتب رسالتك هنا...',
        inputAttributes: {
          'aria-label': 'اكتب رسالتك هنا'
        },
        showCancelButton: true,
        confirmButtonText: 'إرسال',
        cancelButtonText: 'إلغاء',
        confirmButtonColor: '#3085d6',
        inputValidator: (value) => {
          if (!value) {
            return 'يجب كتابة تفاصيل الرسالة أولاً!';
          }
        }
      });

      if (message) {
        UIManager.showLoader("جاري إرسال رسالتك...");
        try {
          const currentUser = GlobalStore.getState().currentUser;
          const payload = {
            message: message,
            user: currentUser ? currentUser.name + " (" + currentUser.username + ")" : "مستخدم غير معروف",
            page: this.currentPage
          };
          const success = await ApiClient.call('api_sendFeedback', payload);
          if (success) {
            UIManager.showSuccess("تم إرسال رسالتك بنجاح، شكراً لتواصلك معنا!");
          } else {
            UIManager.showError("حدث خطأ أثناء إرسال الرسالة.");
          }
        } catch (e) {
          UIManager.showError("فشل الإرسال: " + e.message);
        }
      }
    }

    static showAccountSettings() {
      document.getElementById('accountSettingsForm').reset();
      new bootstrap.Modal(document.getElementById('accountSettingsModal')).show();
    }

    static async updateAccountSettings() {
      const newPassword = document.getElementById('myNewPassword').value.trim();
      if (!newPassword) return;

      UIManager.showLoader("جاري تحديث كلمة المرور...");
      try {
        const state = GlobalStore.getState();
        const currentUser = state.currentUser;
        // using the same api we used for update, but here user updates himself
        await ApiClient.call('api_updateUser', currentUser.userId, { Password: newPassword }, currentUser.username);

        bootstrap.Modal.getInstance(document.getElementById('accountSettingsModal')).hide();
        UIManager.showSuccess("تم تغيير كلمة المرور بنجاح");
      } catch (e) {
        UIManager.showError("حدث خطأ أثناء تغيير كلمة المرور");
      }
    }

    static async refreshData() {
      const btn = document.getElementById('refreshBtn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      }
      
      UIManager.showLoader("جاري سحب البيانات الجديدة...");
      
      try {
        const currentUser = GlobalStore.getState().currentUser;
        // نبعت true للـ API عشان يتجاهل الكاش ويحدث البيانات من جوجل شيت فوراً
        const initialAppData = await ApiClient.call('api_getInitialAppData', currentUser.username, true);
        GlobalStore.setState({
          clients: initialAppData.clients, groups: initialAppData.groups,
          records: initialAppData.records, attachments: initialAppData.attachments, users: initialAppData.users || [],
          tags: initialAppData.tags || [], legalEntities: initialAppData.legalEntities || [],
          tasks: initialAppData.tasks || [], taskTemplates: initialAppData.taskTemplates || [],
          taxConfig: initialAppData.taxConfig || [], credentials: initialAppData.credentials || []
        });
        this.navigate(this.currentPage, this.currentParam);
        UIManager.hideLoader();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'تم تحديث البيانات بنجاح', showConfirmButton: false, timer: 2000, timerProgressBar: true });
      } catch (error) {
        UIManager.hideLoader();
        UIManager.showError(error.message, "فشل في تحديث البيانات");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sync-alt fs-6"></i>';
        }
      }
    }

    // =========================================
    // Notifications Logic
    // =========================================
    static updateNotificationBadge(count) {
      const badge = document.getElementById('notificationBadge');
      const btn = document.getElementById('notificationBtn');
      if (!badge || !btn) return;
      
      if (count && count > 0) {
        badge.style.display = 'block';
        badge.textContent = count > 99 ? '99+' : count;
        btn.classList.add('has-notifications');
      } else {
        badge.style.display = 'none';
        btn.classList.remove('has-notifications');
      }
    }

    static async openNotifications() {
      const list = document.getElementById('notificationList');
      if (!list) return;

      const cached = GlobalStore.getState().notifications;
      if (cached && cached.length > 0) {
        this.renderNotifications(cached);
      } else {
        list.innerHTML = '<div class="p-4 text-center text-muted"><i class="fas fa-circle-notch fa-spin fs-4"></i><br>جاري التحميل...</div>';
      }
      
      try {
        const notifications = await ApiClient.call('api_getUserNotifications', GlobalStore.getState().currentUser.username);
        GlobalStore.setState({ notifications });
        this.renderNotifications(notifications);
      } catch (e) {
        if (!cached) list.innerHTML = '<div class="p-4 text-center text-danger">فشل تحميل الإشعارات.</div>';
      }
    }

    static renderNotifications(notifications) {
      const list = document.getElementById('notificationList');
      if (!notifications || notifications.length === 0) {
        list.innerHTML = '<div class="p-4 text-center text-muted">لا يوجد إشعارات.</div>';
        return;
      }

      let html = '<div class="list-group list-group-flush">';
      notifications.forEach(n => {
        const isRead = String(n.Is_Read).toUpperCase() === 'TRUE';
        const bg = isRead ? 'bg-light' : 'bg-white border-start border-primary border-4';
        const titleColor = isRead ? 'text-muted' : 'text-dark fw-bold';
        const icon = isRead ? '<i class="fas fa-check-double text-success" title="مقروء"></i>' : `<i class="fas fa-circle text-primary" style="font-size: 0.7rem; cursor: pointer; padding: 5px;" title="تحديد كمقروء" onclick="event.stopPropagation(); App.markNotificationAsReadOnly('${n.Notification_ID}')"></i>`;
        
        html += `
          <a href="javascript:void(0)" onclick="App.handleNotificationClick('${n.Notification_ID}', '${n.Link}', ${isRead})" class="list-group-item list-group-item-action ${bg} p-3 border-bottom">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <h6 class="mb-0 ${titleColor}">${n.Title}</h6>
              <div class="d-flex align-items-center">
                <small class="text-muted me-2" style="font-size: 0.7rem;">${new Date(n.Created_At).toLocaleDateString('en-GB')}</small>
                ${icon}
              </div>
            </div>
            <p class="mb-0 text-secondary" style="font-size: 0.85rem;">${n.Message}</p>
          </a>
        `;
      });
      html += '</div>';
      list.innerHTML = html;
    }

    static async markAllNotificationsAsRead() {
      const cached = GlobalStore.getState().notifications;
      if (!cached) return;
      const unreadIds = cached.filter(n => String(n.Is_Read).toUpperCase() !== 'TRUE').map(n => n.Notification_ID);
      if (unreadIds.length === 0) return;

      // Update UI optimistically
      const updated = cached.map(n => ({ ...n, Is_Read: true }));
      GlobalStore.setState({ unreadCount: 0, notifications: updated });
      this.renderNotifications(updated);

      try {
        await ApiClient.call('api_markNotificationsAsRead', unreadIds, GlobalStore.getState().currentUser.username);
      } catch (e) {
        // Intentional silent fail: optimistic update already applied; rollback complexity
        // is not warranted for a background read-status sync.
      }
    }

    static async markNotificationAsReadOnly(id) {
      // Update UI optimistically
      const currentCount = GlobalStore.getState().unreadCount || 0;
      const notifications = GlobalStore.getState().notifications;
      if (notifications) {
        const updated = notifications.map(n => n.Notification_ID === id ? { ...n, Is_Read: true } : n);
        GlobalStore.setState({ unreadCount: Math.max(0, currentCount - 1), notifications: updated });
        this.renderNotifications(updated);
      } else {
        GlobalStore.setState({ unreadCount: Math.max(0, currentCount - 1) });
      }

      try {
        await ApiClient.call('api_markNotificationsAsRead', [id], GlobalStore.getState().currentUser.username);
      } catch (e) {
        // Intentional silent fail: UI already updated optimistically; single-item read sync.
      }
    }

    static async handleNotificationClick(id, link, isRead) {
      // Mark as read if unread
      if (!isRead) {
        try {
          await ApiClient.call('api_markNotificationsAsRead', [id], GlobalStore.getState().currentUser.username);
          // Decrease unread count locally for instant UX
          const currentCount = GlobalStore.getState().unreadCount || 0;
          const notifications = GlobalStore.getState().notifications;
          if (notifications) {
            const updated = notifications.map(n => n.Notification_ID === id ? { ...n, Is_Read: true } : n);
            GlobalStore.setState({ unreadCount: Math.max(0, currentCount - 1), notifications: updated });
          } else {
            GlobalStore.setState({ unreadCount: Math.max(0, currentCount - 1) });
          }
        } catch(e) {}
      }

      // Close offcanvas
      const offcanvasEl = document.getElementById('notificationOffcanvas');
      if (offcanvasEl) {
        const offcanvasInstance = bootstrap.Offcanvas.getInstance(offcanvasEl);
        if(offcanvasInstance) offcanvasInstance.hide();
      }

      // Navigate
      if (link && link !== "") {
        this.navigate(link);
      }
    }

    static startHeartbeatPolling() {
      let interval = 15000; // 15s for near real-time
      const maxInterval = 60000; // 1 min max
      let timer = null;

      const poll = async () => {
        // Only poll if tab is active
        if (!document.hidden) {
          try {
            const res = await ApiClient.call('api_getUnreadHeartbeat', GlobalStore.getState().currentUser.username);
            GlobalStore.setState({ unreadCount: res.count });
            interval = res.count > 0 ? 15000 : Math.min(interval * 1.5, maxInterval);
          } catch(e) {}
        }
        schedule();
      };

      const schedule = () => {
        if(timer) clearTimeout(timer);
        timer = setTimeout(poll, interval);
      };

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          interval = 15000;
          poll();
        }
      });

      // Execute immediately on startup instead of waiting 60s
      poll();
    }

    static initKeyboardNavigation() {
      document.addEventListener('keydown', (e) => {
        // لا تنفذ لو المستخدم بيكتب في حقل إدخال عشان منبوظش الكتابة
        const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
        if (['input', 'textarea', 'select'].includes(activeTag) || document.activeElement.isContentEditable) {
          return;
        }

        // سهم شمال -> خطوة لورا (Back)
        if (e.key === 'ArrowLeft') {
          if (App.historyIndex > 0) {
            App.historyIndex--;
            const prevState = App.history[App.historyIndex];
            App.isNavigatingFromHistory = true;
            App.navigate(prevState.pageId, prevState.param);
            App.isNavigatingFromHistory = false;
          }
        }
        // سهم يمين -> خطوة لقدام (Forward)
        else if (e.key === 'ArrowRight') {
          if (App.historyIndex < App.history.length - 1) {
            App.historyIndex++;
            const nextState = App.history[App.historyIndex];
            App.isNavigatingFromHistory = true;
            App.navigate(nextState.pageId, nextState.param);
            App.isNavigatingFromHistory = false;
          }
        }
      });
    }
  }

  App.currentPage = 'dashboard';
  App.currentParam = null;
  App.history = [];
  App.historyIndex = -1;
  App.isNavigatingFromHistory = false;
  App.ROLES = { ADMIN: 'Admin', USER: 'User', VIEWER: 'Viewer' };
  App.ROUTES = {
    'dashboard': { template: 'dashboard-template', controllerName: 'DashboardController', method: 'renderStats', restricted: true },
    'clients': { template: 'clients-view-template', controllerName: 'ClientController', method: 'renderTable' },
    'groups': { template: 'groups-view-template', controllerName: 'GroupController', method: 'renderView' },
    'records': { template: 'records-view-template', controllerName: 'RecordController', method: 'renderView' },
    'attachments': { template: 'attachments-view-template', controllerName: 'AttachmentController', method: 'renderView' },
    'search': { template: 'search-view-template' },
    'trash': { template: 'trash-view-template', controllerName: 'TrashController', method: 'renderTable', restricted: true },
    'users': { template: 'users-view-template', controllerName: 'UserController', method: 'renderTable', restricted: true },
    'profile': { template: 'profile-view-template', controllerName: 'ProfileController', method: 'renderView' },
    'logs': { template: 'logs-view-template', controllerName: 'LogController', method: 'loadView', restricted: true },
    'tasks-admin': { template: 'tasks-admin-template', controllerName: 'TaskAdminController', method: 'renderView', restricted: true },
    'my-tasks': { template: 'my-tasks-template', controllerName: 'MyTasksController', method: 'renderView' }
  };

  document.addEventListener("DOMContentLoaded", () => App.boot());
</script>
