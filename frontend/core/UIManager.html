<script>
/**
 * UIManager (Facade / Utility Pattern)
 * مسؤول عن توحيد شكل الرسائل واللودر في كل النظام باستخدام SweetAlert2
 * يمنع تكرار الكود نهائياً ويجعل استدعاء الرسائل يتم بسطر واحد فقط.
 */
class UIManager {
  
  static escapeHTML(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // 1. إظهار شاشة التحميل (Loader)
  static showLoader(message = "جاري معالجة البيانات...") {
    Swal.fire({
      title: `<div class="mt-3 fs-5 fw-bold" style="font-family: 'Tajawal', sans-serif; color: var(--primary-color);">${message}</div>`,
      allowOutsideClick: false,
      showConfirmButton: false,
      background: 'var(--card-bg)',
      color: 'var(--text-main)',
      customClass: {
        popup: 'rounded-4 shadow-lg border-0'
      },
      didOpen: () => {
        Swal.showLoading();
        const loader = Swal.getHtmlContainer().querySelector('.swal2-loader');
        if (loader) {
          loader.style.borderColor = 'var(--primary-color) transparent var(--primary-color) transparent';
        }
      }
    });
  }

  // 2. إخفاء شاشة التحميل
  static hideLoader() {
    Swal.close();
  }

  // 3. رسالة النجاح
  static showSuccess(message, title = "نجاح!") {
    Swal.fire({
      icon: 'success',
      title: title,
      text: message,
      confirmButtonColor: 'var(--primary-color)',
      background: 'var(--card-bg)',
      color: 'var(--text-main)',
      customClass: {
        popup: 'rounded-4 shadow-lg border-0',
        confirmButton: 'btn btn-primary rounded-3 px-4 shadow-sm'
      },
      buttonsStyling: false,
      timer: 2000,
      timerProgressBar: true
    });
  }

  // 4. رسالة الخطأ
  static showError(message, title = "عفواً، حدث خطأ!") {
    Swal.fire({
      icon: 'error',
      title: title,
      text: message,
      confirmButtonColor: '#ef4444',
      background: 'var(--card-bg)',
      color: 'var(--text-main)',
      customClass: {
        popup: 'rounded-4 shadow-lg border-0',
        confirmButton: 'btn btn-danger rounded-3 px-4 shadow-sm'
      },
      buttonsStyling: false
    });
  }

  // 5. نافذة التأكيد (مثال: قبل الحذف) - ترجع Promise (true/false)
  static async confirmAction(message = "هل أنت متأكد من هذا الإجراء؟", title = "تأكيد خطير!") {
    const result = await Swal.fire({
      title: title,
      text: message,
      icon: 'warning',
      showCancelButton: true,
      background: 'var(--card-bg)',
      color: 'var(--text-main)',
      customClass: {
        popup: 'rounded-4 shadow-lg border-0',
        confirmButton: 'btn btn-danger rounded-3 px-4 shadow-sm me-2',
        cancelButton: 'btn btn-secondary rounded-3 px-4 shadow-sm'
      },
      buttonsStyling: false,
      confirmButtonText: 'نعم، نفذ الإجراء',
      cancelButtonText: 'إلغاء'
    });
    return result.isConfirmed;
  }
}
</script>
