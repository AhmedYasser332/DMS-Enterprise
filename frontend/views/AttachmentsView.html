<template id="attachments-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <div>
        <button class="btn btn-outline-secondary btn-sm me-3 shadow-sm" onclick="AttachmentController.goBack()">
          <i class="fas fa-arrow-right"></i> عودة للسجلات
        </button>
        <h3 class="text-primary m-0 d-inline-block align-middle">
          <i class="fas fa-paperclip me-2"></i> المرفقات <span id="currentRecordTitle" class="text-muted fs-5"></span>
        </h3>
      </div>
      <input type="file" id="fileInput" style="display: none;" onchange="AttachmentController.handleFileUpload(this)">
      <button class="btn btn-success shadow-sm" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-upload"></i> رفع ملف جديد
      </button>
    </div>
    
    <div class="col-12">
      <div id="attachmentsContainer" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        </div>
    </div>
  </div>
</template>

<script>
class AttachmentController {
  static currentRecordId = null;
  static parentGroupId = null;

  static renderView(recordId) {
    if (!recordId) { App.navigate('clients'); return; }
    
    this.currentRecordId = recordId;
    const state = GlobalStore.getState();
    const record = state.records.find(r => r.Record_ID === recordId);
    
    if (record) {
      this.parentGroupId = record.Sub_ID;
      document.getElementById('currentRecordTitle').textContent = `(السجل: ${record.Title})`;
    }
    
    this.renderCards();
  }

  static goBack() {
    App.navigate('records', this.parentGroupId);
  }

  static renderCards() {
    const container = document.getElementById('attachmentsContainer');
    if (!container) return;

    const state = GlobalStore.getState();
    const fileAttachments = (state.attachments || []).filter(a => 
      a.Record_ID === this.currentRecordId && 
      String(a.Is_Deleted).toUpperCase() !== "TRUE"
    );

    if (fileAttachments.length === 0) {
      container.innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="fas fa-cloud-upload-alt fa-4x mb-3 d-block text-black-50"></i> لا توجد مرفقات لهذا السجل.</div>`;
      return;
    }

    container.innerHTML = fileAttachments.map(file => `
      <div class="col">
        <div class="card h-100 shadow-sm border-0 record-card">
          <div class="card-body text-center p-4">
            <i class="fas fa-file-pdf fa-3x text-danger mb-3"></i> <h6 class="card-title text-truncate" title="${file.File_Name}">${file.File_Name}</h6>
            <p class="text-muted small mb-3">${file.Uploaded_At.split(',')[0]}</p>
            <div class="d-flex justify-content-center gap-2">
              <a href="${file.Drive_URL}" target="_blank" class="btn btn-sm btn-primary shadow-sm">
                <i class="fas fa-eye"></i> عرض
              </a>
              <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="AttachmentController.deleteFile('${file.File_ID}', '${file.File_Name}')">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    App.applyPermissions();
  }

  static async handleFileUpload(input) {
    const file = input.files[0];
    if (!file) return;

    UIManager.showLoader("جاري رفع الملف ومعالجته...");
    
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64Data = e.target.result.split(',')[1];
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';

      try {
        await ApiClient.call('api_uploadAttachment', this.currentRecordId, file.name, base64Data, file.type, userEmail);
        
        // ⚡ ملاحظة هامة: بما أن الرفع يتطلب تحديث الـ Attachments من السيرفر للتأكد من الـ URL والـ ID
        // سنقوم بإعادة تحميل البيانات الأولية لتحديث الذاكرة المركزية بالكامل
        const dbData = await ApiClient.call('api_getInitialAppData');
        GlobalStore.setState({ attachments: dbData.attachments });
        
        this.renderCards();
        UIManager.showSuccess("تم رفع الملف بنجاح على Google Drive!");
      } catch (error) {
        UIManager.showError(error.message);
      } finally {
        input.value = ''; // تنظيف المدخل
      }
    };
    reader.readAsDataURL(file);
  }

  static async deleteFile(fileId, fileName) {
    const isConfirmed = await UIManager.confirmAction(`هل تريد حذف المرفق "${fileName}"؟`);
    if (!isConfirmed) return;

    UIManager.showLoader("جاري الحذف...");
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';
      
      await ApiClient.call('api_deleteAttachment', fileId, fileName, userEmail);
      
      const updatedAtts = state.attachments.map(a => {
        if (a.File_ID === fileId) a.Is_Deleted = true;
        return a;
      });
      GlobalStore.setState({ attachments: updatedAtts });
      
      this.renderCards();
      UIManager.showSuccess("تم حذف الملف.");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}
</script>
