<template id="attachments-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <div>
        <button class="btn btn-outline-secondary btn-sm me-3 shadow-sm" onclick="AttachmentController.goBack()">
          <i class="fas fa-arrow-right"></i> عودة للسجلات
        </button>
        <h3 class="text-primary m-0 d-inline-block align-middle">
          <i class="fas fa-paperclip me-2"></i> المرفقات <span id="currentRecordTitle" class="text-muted fs-5"></span>
        </h3>
      </div>
      <div class="d-flex">
        <input type="file" id="fileInput" class="d-none" onchange="AttachmentController.uploadFile(this)">
        <button class="btn btn-success shadow-sm" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-upload"></i> رفع ملف جديد
        </button>
      </div>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover text-center align-middle m-0">
              <thead class="table-dark">
                <tr>
                  <th>نوع الملف</th>
                  <th>اسم الملف</th>
                  <th>الحجم</th>
                  <th>تاريخ الرفع</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="attachmentsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
class AttachmentController {
  static currentRecordId = null;

  static escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  static renderView(recordId) {
    if (!recordId) { App.navigate('clients'); return; }
    this.currentRecordId = recordId;
    const state = GlobalStore.getState();
    const records = state.records || [];
    const record = records.find(r => r.Record_ID === recordId);
    if (record) {
      const titleEl = document.getElementById('currentRecordTitle');
      if (titleEl) titleEl.textContent = `(السجل: ${record.Title})`;
    }
    this.renderTable();
  }

  static goBack() {
    const state = GlobalStore.getState();
    const records = state.records || [];
    const record = records.find(r => r.Record_ID === this.currentRecordId);
    if (record) App.navigate('records', record.Group_ID);
    else App.navigate('clients');
  }

  static renderTable() {
    const tbody = document.getElementById('attachmentsTableBody');
    if (!tbody) return;
    const state = GlobalStore.getState();
    const allAttachments = state.attachments || [];
    const attachments = allAttachments.filter(a => 
      a.Record_ID === this.currentRecordId && String(a.Is_Deleted).toUpperCase() !== "TRUE"
    );

    if (attachments.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-file-excel fa-3x mb-3 d-block text-black-50"></i> لا توجد مرفقات.</td></tr>`;
      return;
    }

    tbody.innerHTML = attachments.map(a => {
      // Fallbacks in case the backend DB was missing these new columns for old records
      const inferredMimeType = (a.Mime_Type || '').toLowerCase() || (/\.(pdf)$/i.test(a.File_Name) ? 'pdf' : (/\.(jpe?g|png|gif|webp)$/i.test(a.File_Name) ? 'image' : ''));
      const isPrintable = inferredMimeType.includes('pdf') || inferredMimeType.includes('image');
      const safeName = AttachmentController.escapeHtml(a.File_Name || 'بدون اسم');
      const size = a.Size ? AttachmentController.formatSize(a.Size) : 'غير معروف';
      const date = a.Uploaded_At ? String(a.Uploaded_At).split(',')[0] : '-';
      const viewLink = a.View_Link || '#';
      
      const jsSafeId = String(a.Attachment_ID || '').replace(/'/g, "\\'").replace(/"/g, '\\"');
      const jsSafeName = String(a.File_Name || '').replace(/'/g, "\\'").replace(/"/g, '\\"');

      return `
      <tr>
        <td>${AttachmentController.getFileIcon(inferredMimeType)}</td>
        <td class="fw-bold text-truncate" style="max-width: 250px;" title="${safeName}">${safeName}</td>
        <td><span class="badge bg-light text-dark border">${size}</span></td>
        <td class="text-muted small">${date}</td>
        <td>
          <a href="${viewLink}" target="_blank" class="btn btn-sm btn-outline-primary me-1 shadow-sm" title="عرض">
            <i class="fas fa-eye"></i>
          </a>
          
          ${isPrintable ? `
          <button class="btn btn-sm btn-outline-secondary me-1 shadow-sm" onclick="AttachmentController.printAttachment('${jsSafeId}')" title="طباعة">
            <i class="fas fa-print"></i>
          </button>` : ''}

          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="AttachmentController.deleteFile('${jsSafeId}', '${jsSafeName}')" title="حذف">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>
    `}).join('');
    
    if (typeof App !== 'undefined' && typeof App.applyPermissions === 'function') {
      App.applyPermissions();
    }
  }

  static async printAttachment(attachmentId) {
    try {
      if (typeof UIManager !== 'undefined') UIManager.showLoader('جاري تجهيز الملف للطباعة...');
      
      const state = GlobalStore.getState();
      const attachment = (state.attachments || []).find(a => a.Attachment_ID === attachmentId);
      if (!attachment) throw new Error('لم يتم العثور على بيانات المرفق.');

      const mimeType = String(attachment.Mime_Type || '').toLowerCase();
      const isImage = mimeType.includes('image');
      const isPdf = mimeType.includes('pdf');

      if (!isPdf && !isImage) throw new Error('نوع الملف غير مدعوم للطباعة المباشرة.');

      const fileData = await ApiClient.call('api_getFileBase64', attachment.Drive_File_ID);
      if (!fileData || !fileData.base64) throw new Error('فشل جلب بيانات الملف للطباعة.');

      const byteCharacters = atob(fileData.base64);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const fileBlob = new Blob([byteArray], { type: fileData.mimeType || mimeType });
      const fileUrl = URL.createObjectURL(fileBlob);

      // استراتيجية Viewport Ghost: الـ iframe داخل الشاشة لكن شفاف لتجنب إهمال المتصفح (Optimization)
      const iframe = document.createElement('iframe');
      iframe.style.position = 'fixed';
      iframe.style.top = '0';
      iframe.style.left = '0';
      iframe.style.width = '100vw';
      iframe.style.height = '100vh';
      iframe.style.zIndex = '-9999';
      iframe.style.opacity = '0.01';
      iframe.style.pointerEvents = 'none';
      iframe.style.border = 'none';
      document.body.appendChild(iframe);

      const cleanup = () => {
        setTimeout(() => {
          if (document.body.contains(iframe)) document.body.removeChild(iframe);
          URL.revokeObjectURL(fileUrl);
        }, 10000);
      };

      if (isImage) {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(`
          <html>
            <head>
              <style>
                @media print {
                  body, html, img { width: 100% !important; height: 100% !important; margin: 0 !important; padding: 0 !important; }
                }
              </style>
            </head>
            <body style="margin:0; padding:0; display:flex; align-items:center; justify-content:center;">
              <img src="${fileUrl}" style="max-width:100%; max-height:100%;" onload="window.print();" />
            </body>
          </html>
        `);
        doc.close();
        cleanup();
      } else if (isPdf) {
        if (typeof UIManager !== 'undefined') UIManager.showLoader('جاري معالجة صفحات الـ PDF للطباعة...');
        
        // استخدام مكتبة PDF.js لتحويل الصفحات إلى صور صالحة للطباعة داخل HTML
        const loadingTask = pdfjsLib.getDocument({ data: atob(fileData.base64) });
        const pdf = await loadingTask.promise;
        
        let htmlContent = `
          <html>
            <head>
              <style>
                @media print {
                  body, html { margin:0; padding:0; width: 100%; }
                  img { width: 100%; display: block; page-break-after: always; }
                  img:last-child { page-break-after: auto; }
                }
              </style>
            </head>
            <body style="margin:0; padding:0;">
        `;
        
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: 2.0 }); // دقة عالية للطباعة
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          
          await page.render({ canvasContext: context, viewport: viewport }).promise;
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          htmlContent += `<img src="${imgData}" />`;
        }
        
        htmlContent += `
              <script>
                window.onload = function() {
                  setTimeout(function() {
                    window.print();
                  }, 500);
                };
              <\/script>
            </body>
          </html>
        `;

        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(htmlContent);
        doc.close();
        cleanup();
      }

    } catch (error) {
      console.error("Print Error:", error);
      if (typeof UIManager !== 'undefined') UIManager.showError(error.message || 'حدث خطأ أثناء محاولة الطباعة.');
    } finally {
      if (typeof UIManager !== 'undefined') UIManager.hideLoader();
    }
  }

  static getFileIcon(mimeType) {
    const type = String(mimeType || '').toLowerCase();
    if (type.includes('pdf')) return '<i class="fas fa-file-pdf text-danger fs-4"></i>';
    if (type.includes('image')) return '<i class="fas fa-file-image text-success fs-4"></i>';
    if (type.includes('word')) return '<i class="fas fa-file-word text-primary fs-4"></i>';
    if (type.includes('excel') || type.includes('sheet')) return '<i class="fas fa-file-excel text-success fs-4"></i>';
    return '<i class="fas fa-file fs-4 text-secondary"></i>';
  }

  static formatSize(bytes) {
    const val = parseInt(bytes);
    if (isNaN(val) || val <= 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(val) / Math.log(k));
    return parseFloat((val / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  static async uploadFile(input) {
    const file = input.files && input.files[0];
    if (!file) return;

    try {
      if (file.size > 50 * 1024 * 1024) { 
        throw new Error("حجم الملف كبير جداً! الحد الأقصى 50 ميجا بايت.");
      }

      if (typeof UIManager !== 'undefined') UIManager.showLoader(`جاري رفع "${file.name}"...`);

      const base64String = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
        reader.onerror = () => reject(new Error("حدث خطأ أثناء قراءة الملف من جهازك."));
        reader.readAsDataURL(file);
      });

      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? (state.currentUser.username || state.currentUser.email) : 'System';
      const currentRecId = AttachmentController.currentRecordId;

      if (!currentRecId) throw new Error("لا يوجد سجل محدد لربط المرفق به.");

      const newAttachment = await ApiClient.call('api_uploadAttachment', currentRecId, file.name, base64String, file.type, userEmail);

      const allAttachments = state.attachments || [];
      GlobalStore.setState({ attachments: [...allAttachments, newAttachment] });
      
      AttachmentController.renderTable();
      if (typeof UIManager !== 'undefined') UIManager.showSuccess("تم رفع الملف بنجاح!");
      
    } catch (error) {
      console.error("Upload Error:", error);
      if (typeof UIManager !== 'undefined') UIManager.showError(error.message || "حدث خطأ غير معروف أثناء الرفع.");
    } finally {
      input.value = "";
      if (typeof UIManager !== 'undefined') UIManager.hideLoader();
    }
  }

  static async deleteFile(fileId, fileName) {
    let ok = true;
    if (typeof UIManager !== 'undefined') {
      ok = await UIManager.confirmAction(`هل تريد حذف المرفق "${fileName}"؟`);
    } else {
      ok = confirm(`هل تريد حذف المرفق "${fileName}"؟`);
    }
    if (!ok) return;

    if (typeof UIManager !== 'undefined') UIManager.showLoader("جاري الحذف...");
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? (state.currentUser.username || state.currentUser.email) : 'System';
      await ApiClient.call('api_deleteAttachment', fileId, fileName, userEmail);
      
      const allAttachments = state.attachments || [];
      const updatedFiles = allAttachments.map(a => a.Attachment_ID === fileId ? { ...a, Is_Deleted: true } : a);
      GlobalStore.setState({ attachments: updatedFiles });
      
      AttachmentController.renderTable();
      if (typeof UIManager !== 'undefined') UIManager.showSuccess("تم الحذف.");
    } catch (error) {
      console.error("Delete Error:", error);
      if (typeof UIManager !== 'undefined') UIManager.showError(error.message || "حدث خطأ أثناء الحذف.");
    } finally {
      if (typeof UIManager !== 'undefined') UIManager.hideLoader();
    }
  }
}
</script>
