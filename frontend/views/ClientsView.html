<template id="clients-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <h3 class="text-primary m-0"><i class="fas fa-users me-2"></i> إدارة العملاء</h3>
      <button class="btn btn-success shadow-sm" onclick="ClientController.showAddModal()">
        <i class="fas fa-plus"></i> إضافة عميل جديد
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-striped text-center align-middle m-0">
              <thead class="table-dark">
                <tr>
                  <th>اسم العميل</th>
                  <th>السجل الضريبي</th>
                  <th>الكيان القانوني</th>
                  <th>تاريخ الإضافة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="clientsTableBody">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addClientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> إضافة عميل جديد</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addClientForm" onsubmit="event.preventDefault(); ClientController.addClient();">
            <div class="mb-3">
              <label class="form-label fw-bold">اسم العميل <span class="text-danger">*</span></label>
              <input type="text" id="newClientName" class="form-control form-control-lg" placeholder="اكتب اسم العميل..." required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">رقم التسجيل الضريبي (اختياري)</label>
              <input type="text" id="newClientTaxId" class="form-control" placeholder="999-999-999" pattern="\\d{3}-\\d{3}-\\d{3}" title="يجب أن يكون على شكل 999-999-999">
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">الكيان القانوني (اختياري)</label>
              <input type="text" id="newClientLegalEntity" class="form-control" placeholder="مثال: شركة مساهمة، فردي، إلخ...">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i> حفظ بيانات العميل</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
/**
 * ClientController
 * مسؤول عن التحكم الكامل في شاشة العملاء (رسم الجدول، الإضافة، الحذف)
 */
class ClientController {
  
  // 1. رسم الجدول بناءً على الداتا الموجودة في الذاكرة المركزية
  static renderTable() {
    const tbody = document.getElementById('clientsTableBody');
    if (!tbody) return; // الحماية لو اليوزر في صفحة تانية
    
    // سحب الداتا من الـ Store
    const state = GlobalStore.getState();
    const clients = state.clients || [];
    
    // فلترة المحذوفين والأقسام المسموح بها للمستخدم الحالي (لو مش مدير)
    const role = state.currentUser.role;
    const allowed = state.currentUser.allowedClients || "";
    
    const visibleClients = clients.filter(c => {
      if (String(c.Is_Deleted).toUpperCase() === "TRUE") return false;
      if (role === 'Admin') return true;
      return allowed.includes(c.Main_ID);
    });

    if (visibleClients.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-folder-open fa-3x mb-3 d-block text-black-50"></i> لا توجد بيانات لعرضها.</td></tr>`;
      return;
    }

    // رسم الصفوف
    tbody.innerHTML = visibleClients.map(client => `
      <tr>
        <td class="fw-bold text-primary">${client.Name}</td>
        <td><span class="badge bg-secondary">${client.Tax_ID || '-'}</span></td>
        <td>${client.Legal_Entity || '-'}</td>
        <td class="text-muted small">${client.Created_At.split(',')[0]}</td>
        <td>
          <button class="btn btn-sm btn-info text-white me-1 shadow-sm" onclick="App.navigate('groups', '${client.Main_ID}')" title="فتح مجموعات البيانات">
            <i class="fas fa-folder-open"></i> المجموعات
          </button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="ClientController.deleteClient('${client.Main_ID}', '${client.Name}')" title="نقل للمهملات">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>
    `).join('');
    
    // إعادة تطبيق الصلاحيات عشان الزراير تستخبى لو اليوزر "مشاهد"
    App.applyPermissions(); 
  }

  // 2. إظهار نافذة الإضافة
  static showAddModal() {
    document.getElementById('addClientForm').reset();
    const modal = new bootstrap.Modal(document.getElementById('addClientModal'));
    modal.show();
  }

  // 3. إضافة عميل جديد
  static async addClient() {
    const name = document.getElementById('newClientName').value.trim();
    const taxId = document.getElementById('newClientTaxId').value.trim();
    const legalEntity = document.getElementById('newClientLegalEntity').value.trim();
    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري حفظ العميل...");
    
    try {
      // السحر هنا: بنبعت للباك-إند بالـ async/await
      const newClient = await ApiClient.call('api_addClient', name, taxId, legalEntity, userEmail);
      
      // تحديث الذاكرة المركزية فوراً (بدون ما نعمل ريفريش للشيت كله)
      const updatedClients = [...state.clients, newClient];
      GlobalStore.setState({ clients: updatedClients });
      
      // قفل المودال وإعادة رسم الجدول بس
      const modalElement = document.getElementById('addClientModal');
      bootstrap.Modal.getInstance(modalElement).hide();
      this.renderTable();
      
      UIManager.showSuccess("تمت إضافة العميل بنجاح!");
      
    } catch (error) {
      UIManager.showError(error.message);
    }
  }

  // 4. حذف عميل (Soft Delete)
  static async deleteClient(clientId, clientName) {
    // استخدام مدير التنبيهات المركزي للتأكيد
    const isConfirmed = await UIManager.confirmAction(`هل أنت متأكد من مسح العميل "${clientName}"؟`);
    if (!isConfirmed) return;

    UIManager.showLoader("جاري الحذف...");
    
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';
      
      // أمر الحذف للباك-إند
      await ApiClient.call('api_deleteClient', clientId, clientName, userEmail);
      
      // تحديث الذاكرة المركزية (تغيير حالة Is_Deleted لـ true محلياً)
      const updatedClients = state.clients.map(c => {
        if (c.Main_ID === clientId) c.Is_Deleted = true;
        return c;
      });
      GlobalStore.setState({ clients: updatedClients });
      
      this.renderTable();
      UIManager.showSuccess("تم نقل العميل إلى سلة المهملات.");
      
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}
</script>
