<template id="clients-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-4 d-flex justify-content-between align-items-center pb-2">
      <h3 class="text-primary m-0 fw-bold"><i class="fas fa-users me-2"></i> إدارة العملاء</h3>
      <button class="btn btn-primary shadow-sm" onclick="ClientController.showAddModal()">
        <i class="fas fa-plus me-1"></i> إضافة عميل جديد
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table text-center align-middle m-0">
              <thead>
                <tr>
                  <th>اسم العميل</th>
                  <th>السجل الضريبي</th>
                  <th>الكيان القانوني</th>
                  <th>تاريخ الإضافة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="clientsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addClientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> إضافة عميل جديد</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addClientForm" onsubmit="event.preventDefault(); ClientController.addClient();">
            <div class="mb-3">
              <label class="form-label fw-bold">اسم العميل <span class="text-danger">*</span></label>
              <input type="text" id="newClientName" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">رقم التسجيل الضريبي (اختياري)</label>
              <input type="text" id="newClientTaxId" class="form-control" placeholder="999-999-999" pattern="\d{3}-\d{3}-\d{3}">
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-bold">الكيان القانوني (اختياري)</label>
              <div class="d-flex align-items-center gap-2">
                <select id="newClientLegalEntitySelect" class="form-select flex-grow-1">
                </select>
                <button type="button" class="btn btn-outline-primary manage-le-btn" onclick="ClientController.openManageLegalEntities()" style="display:none;">
                  <i class="fas fa-cog"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i> حفظ بيانات العميل</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Manage Legal Entities Modal -->
  <div class="modal fade" id="manageLegalEntitiesModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">إدارة الكيانات القانونية</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addLegalEntityForm" onsubmit="event.preventDefault(); ClientController.addNewLegalEntity();" class="mb-3 d-flex gap-2" style="display:none;">
            <input type="text" id="newLegalEntityName" class="form-control form-control-sm" placeholder="اسم الكيان" required>
            <input type="color" id="newLegalEntityColor" class="form-control form-control-color form-control-sm" value="#198754" title="اختر لون">
            <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i></button>
          </form>
          <div id="manageLegalEntitiesList" class="list-group list-group-flush" style="max-height: 300px; overflow-y: auto;">
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
class ClientController {
  
  static applyPermissionsLocal() {
    const state = GlobalStore.getState();
    const role = state.currentUser?.role;
    let perms = {};
    if (state.currentUser?.permissions) {
      try { 
        perms = typeof state.currentUser.permissions === 'string' ? JSON.parse(state.currentUser.permissions) : state.currentUser.permissions; 
      } catch(e) {
        console.error("فشل في تحليل الصلاحيات:", e.message);
      }
    }
    
    const canManage = role === 'Admin' || (perms.legalEntities && (perms.legalEntities.add || perms.legalEntities.edit || perms.legalEntities.delete));
    
    if (canManage) {
      document.querySelectorAll('.manage-le-btn').forEach(b => b.style.display = 'block');
    } else {
      document.querySelectorAll('.manage-le-btn').forEach(b => b.style.display = 'none');
    }
  }

  static populateLegalEntities() {
    const select = document.getElementById('newClientLegalEntitySelect');
    const state = GlobalStore.getState();
    const entities = state.legalEntities || [];
    const activeEntities = entities.filter(e => String(e.Is_Deleted).toUpperCase() !== 'TRUE');
    
    select.innerHTML = '<option value="">-- اختر الكيان القانوني --</option>' + 
      activeEntities.map(e => `<option value="${e.Name}">${e.Name}</option>`).join('');
  }

  static openManageLegalEntities() {
    this.renderManageLegalEntitiesList();
    new bootstrap.Modal(document.getElementById('manageLegalEntitiesModal')).show();
  }

  static renderManageLegalEntitiesList() {
    const list = document.getElementById('manageLegalEntitiesList');
    const entities = GlobalStore.getState().legalEntities || [];
    const activeEntities = entities.filter(e => String(e.Is_Deleted).toUpperCase() !== 'TRUE');
    
    const state = GlobalStore.getState();
    const role = state.currentUser?.role;
    let perms = {};
    if (state.currentUser?.permissions) {
      try { 
        perms = typeof state.currentUser.permissions === 'string' ? JSON.parse(state.currentUser.permissions) : state.currentUser.permissions; 
      } catch(e) {
        console.error("فشل في تحليل الصلاحيات:", e.message);
      }
    }
    
    const canAdd = role === 'Admin' || (perms.legalEntities && perms.legalEntities.add);
    const canEdit = role === 'Admin' || (perms.legalEntities && perms.legalEntities.edit);
    const canDelete = role === 'Admin' || (perms.legalEntities && perms.legalEntities.delete);
    
    document.getElementById('addLegalEntityForm').style.display = canAdd ? 'flex' : 'none';
    
    list.innerHTML = activeEntities.map(entity => `
      <div class="list-group-item d-flex justify-content-between align-items-center px-1">
        <div>
          ${canEdit ? `<input type="color" class="form-control form-control-color form-control-sm d-inline-block p-0 me-2" 
                 style="width: 20px; height: 20px;" value="${entity.Color}" onchange="ClientController.updateLegalEntityColor('${entity.Entity_ID}', this.value)">` 
                 : `<span class="d-inline-block me-2 rounded-circle" style="width:15px; height:15px; background-color:${entity.Color};"></span>`}
          <span class="fw-bold small">${entity.Name}</span>
        </div>
        ${canDelete ? `<button class="btn btn-sm btn-link text-danger p-0 m-0" onclick="ClientController.deleteLegalEntity('${entity.Entity_ID}', '${entity.Name}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
    `).join('');
  }

  static async addNewLegalEntity() {
    const name = document.getElementById('newLegalEntityName').value.trim();
    const color = document.getElementById('newLegalEntityColor').value;
    if (!name) return;
    
    const userEmail = GlobalStore.getState().currentUser?.username;
    UIManager.showLoader("جاري إضافة الكيان...");
    try {
      const newEntity = await ApiClient.call('api_addLegalEntity', name, color, userEmail);
      GlobalStore.setState({ legalEntities: [...(GlobalStore.getState().legalEntities || []), newEntity] });
      document.getElementById('addLegalEntityForm').reset();
      this.renderManageLegalEntitiesList();
      this.populateLegalEntities();
      UIManager.hideLoader();
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static async updateLegalEntityColor(entityId, newColor) {
    const entity = GlobalStore.getState().legalEntities.find(e => e.Entity_ID === entityId);
    if(!entity) return;
    const userEmail = GlobalStore.getState().currentUser?.username;
    try {
      await ApiClient.call('api_updateLegalEntity', entityId, entity.Name, newColor, userEmail);
      const updatedEntities = GlobalStore.getState().legalEntities.map(e => e.Entity_ID === entityId ? { ...e, Color: newColor } : e);
      GlobalStore.setState({ legalEntities: updatedEntities });
      this.renderTable();
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static async deleteLegalEntity(entityId, name) {
    const ok = await UIManager.confirmAction(`هل أنت متأكد من حذف الكيان القانوني ${name}؟`);
    if(!ok) return;
    
    const userEmail = GlobalStore.getState().currentUser?.username;
    UIManager.showLoader("جاري المسح...");
    try {
      await ApiClient.call('api_deleteLegalEntity', entityId, name, userEmail);
      const entities = GlobalStore.getState().legalEntities.map(e => e.Entity_ID === entityId ? {...e, Is_Deleted: true} : e);
      GlobalStore.setState({ legalEntities: entities });
      
      this.renderManageLegalEntitiesList();
      this.populateLegalEntities();
      UIManager.hideLoader();
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static renderTable() {
    const tbody = document.getElementById('clientsTableBody');
    if (!tbody) return;
    const state = GlobalStore.getState();
    const clients = state.clients || [];
    const role = state.currentUser.role;
    // نتأكد إنها نص ونحولها لـ UpperCase للمقارنة
    const allowed = String(state.currentUser.allowedClients || "").toUpperCase();
    
    const visibleClients = clients.filter(c => {
      if (String(c.Is_Deleted).toUpperCase() === "TRUE") return false;
      // ⚡ السحر هنا: لو أدمن أو الصلاحية ALL يرى كل العملاء ⚡
      if (String(role).toUpperCase() === 'ADMIN' || allowed === 'ALL') return true;
      return allowed.includes(String(c.Client_ID).toUpperCase());
    });

    if (visibleClients.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-folder-open fa-3x mb-3 d-block text-black-50"></i> لا توجد بيانات.</td></tr>`;
      return;
    }

    const renderLegalEntityBadge = (entityName) => {
      if(!entityName || entityName === '-') return '-';
      const entities = state.legalEntities || [];
      const entity = entities.find(e => e.Name === entityName);
      if(entity) {
        return `<span class="badge" style="background-color: ${entity.Color};">${entity.Name}</span>`;
      }
      return `<span class="badge bg-secondary">${entityName}</span>`;
    };

    tbody.innerHTML = visibleClients.map(client => `
      <tr>
        <td class="fw-bold text-primary">${client.Name}</td>
        <td><span class="badge bg-secondary">${client.Tax_ID || '-'}</span></td>
        <td>${renderLegalEntityBadge(client.Legal_Entity)}</td>
        <td class="text-muted small">${client.Created_At.split(',')[0]}</td>
        <td>
          <button class="btn btn-sm text-primary me-1 shadow-sm fw-bold" style="background: rgba(79, 70, 229, 0.1);" onclick="App.navigate('groups', '${client.Client_ID}')"><i class="fas fa-folder-open me-1"></i> المجموعات</button>
          <button class="btn btn-sm text-danger shadow-sm fw-bold" style="background: rgba(239, 68, 68, 0.1);" onclick="ClientController.deleteClient('${client.Client_ID}', '${client.Name}')"><i class="fas fa-trash-alt"></i></button>
        </td>
      </tr>
    `).join('');
    App.applyPermissions(); 
    this.applyPermissionsLocal();
  }

  static showAddModal() {
    document.getElementById('addClientForm').reset();
    this.populateLegalEntities(); // تحديث القائمة قبل الفتح
    new bootstrap.Modal(document.getElementById('addClientModal')).show();
  }

  static async addClient() {
    const name = document.getElementById('newClientName').value.trim();
    const taxId = document.getElementById('newClientTaxId').value.trim();
    const legalEntity = document.getElementById('newClientLegalEntitySelect').value;

    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';

    // 1. Optimistic Update (Zero-Latency)
    const tempId = 'TEMP_' + Date.now();
    const optimisticClient = {
      Client_ID: tempId,
      Name: name,
      Tax_ID: taxId,
      Legal_Entity: legalEntity,
      Created_By: userEmail,
      Created_At: new Date().toISOString(),
      Is_Deleted: "FALSE"
    };
    
    GlobalStore.setState({ clients: [...state.clients, optimisticClient] });
    bootstrap.Modal.getInstance(document.getElementById('addClientModal')).hide();
    this.renderTable();
    
    // 2. Background API Call
    try {
      const realClient = await ApiClient.call('api_addClient', name, taxId, legalEntity, userEmail);
      // Replace temp with real
      const updatedClients = GlobalStore.getState().clients.map(c => c.Client_ID === tempId ? realClient : c);
      GlobalStore.setState({ clients: updatedClients });
    } catch (error) {
      // Rollback
      const rolledBackClients = GlobalStore.getState().clients.filter(c => c.Client_ID !== tempId);
      GlobalStore.setState({ clients: rolledBackClients });
      this.renderTable();
      UIManager.showError(error.message || "فشل في الحفظ، تم التراجع عن التغييرات.");
    }
  }

  static async deleteClient(clientId, clientName) {
    const isConfirmed = await UIManager.confirmAction(`هل أنت متأكد من مسح العميل "${clientName}"؟`);
    if (!isConfirmed) return;
    
    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';
    
    // 1. Optimistic Update
    const originalClients = [...state.clients];
    const updatedClients = originalClients.map(c => c.Client_ID === clientId ? { ...c, Is_Deleted: true } : c);
    GlobalStore.setState({ clients: updatedClients });
    this.renderTable();

    // 2. Background API Call
    try {
      await ApiClient.call('api_deleteClient', clientId, clientName, userEmail);
      UIManager.showSuccess("تم الحذف.");
    } catch (error) {
      // Rollback
      GlobalStore.setState({ clients: originalClients });
      this.renderTable();
      UIManager.showError(error.message || "فشل في الحذف، تم التراجع.");
    }
  }
}
</script>
