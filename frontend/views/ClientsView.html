<template id="clients-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <h3 class="text-primary m-0"><i class="fas fa-users me-2"></i> إدارة العملاء</h3>
      <button class="btn btn-success shadow-sm" onclick="ClientController.showAddModal()">
        <i class="fas fa-plus"></i> إضافة عميل جديد
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover text-center align-middle m-0">
              <thead class="table-dark">
                <tr>
                  <th>اسم العميل</th>
                  <th>السجل الضريبي</th>
                  <th>الكيان القانوني</th>
                  <th>تاريخ الإضافة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="clientsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addClientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> إضافة عميل جديد</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addClientForm" onsubmit="event.preventDefault(); ClientController.addClient();">
            <div class="mb-3">
              <label class="form-label fw-bold">اسم العميل <span class="text-danger">*</span></label>
              <input type="text" id="newClientName" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">رقم التسجيل الضريبي (اختياري)</label>
              <input type="text" id="newClientTaxId" class="form-control" placeholder="999-999-999" pattern="\d{3}-\d{3}-\d{3}">
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-bold">الكيان القانوني (اختياري)</label>
              <select id="newClientLegalEntitySelect" class="form-select" onchange="ClientController.handleLegalEntityChange()">
                </select>
              <input type="text" id="newClientLegalEntityCustom" class="form-control mt-2 d-none fade-in" placeholder="اكتب الكيان القانوني الجديد هنا...">
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i> حفظ بيانات العميل</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
class ClientController {
  
  // دالة إظهار أو إخفاء مربع الإدخال حسب الاختيار
  static handleLegalEntityChange() {
    const select = document.getElementById('newClientLegalEntitySelect');
    const customInput = document.getElementById('newClientLegalEntityCustom');
    if (select.value === 'other') {
      customInput.classList.remove('d-none');
      customInput.required = true;
    } else {
      customInput.classList.add('d-none');
      customInput.required = false;
      customInput.value = ''; // تفريغ المربع
    }
  }

  // دالة لتجميع الكيانات القانونية وعرضها في القائمة
  static populateLegalEntities() {
    const select = document.getElementById('newClientLegalEntitySelect');
    
    // القائمة الأساسية اللي في الصور بتاعتك
    const defaultEntities = [
      'منشأة فردية', 
      'شركة مساهمة', 
      'شركة ذات مسئولية محدودة', 
      'شركة تضامن', 
      'شركة توصية بسيطة', 
      'شركة الشخص الواحد',
      'قطاع عام',
      'قطاع أعمال'
    ];
    
    // السحر هنا: استخراج أي كيان قانوني موجود بالفعل في النظام ومش موجود في القائمة الأساسية
    const state = GlobalStore.getState();
    const existingEntities = (state.clients || [])
      .map(c => c.Legal_Entity)
      .filter(e => e && e.trim() !== ''); // تصفية الفوارغ
    
    // دمج القائمتين وحذف التكرار
    const allEntities = [...new Set([...defaultEntities, ...existingEntities])];
    
    // رسم القائمة
    select.innerHTML = '<option value="">-- اختر الكيان القانوني --</option>' + 
      allEntities.map(e => `<option value="${e}">${e}</option>`).join('') +
      '<option value="other" class="text-primary fw-bold">➕ أخرى (إضافة كيان جديد)...</option>';
  }

  static renderTable() {
    const tbody = document.getElementById('clientsTableBody');
    if (!tbody) return;
    const state = GlobalStore.getState();
    const clients = state.clients || [];
    const role = state.currentUser.role;
    // نتأكد إنها نص ونحولها لـ UpperCase للمقارنة
    const allowed = String(state.currentUser.allowedClients || "").toUpperCase();
    
    const visibleClients = clients.filter(c => {
      if (String(c.Is_Deleted).toUpperCase() === "TRUE") return false;
      // ⚡ السحر هنا: لو أدمن أو الصلاحية ALL يرى كل العملاء ⚡
      if (role === 'Admin' || allowed === 'ALL') return true;
      return allowed.includes(String(c.Main_ID).toUpperCase());
    });

    if (visibleClients.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-folder-open fa-3x mb-3 d-block text-black-50"></i> لا توجد بيانات.</td></tr>`;
      return;
    }

    tbody.innerHTML = visibleClients.map(client => `
      <tr>
        <td class="fw-bold text-primary">${client.Name}</td>
        <td><span class="badge bg-secondary">${client.Tax_ID || '-'}</span></td>
        <td>${client.Legal_Entity || '-'}</td>
        <td class="text-muted small">${client.Created_At.split(',')[0]}</td>
        <td>
          <button class="btn btn-sm btn-info text-white me-1 shadow-sm" onclick="App.navigate('groups', '${client.Main_ID}')"><i class="fas fa-folder-open"></i> المجموعات</button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="ClientController.deleteClient('${client.Main_ID}', '${client.Name}')"><i class="fas fa-trash-alt"></i></button>
        </td>
      </tr>
    `).join('');
    App.applyPermissions(); 
  }

  static showAddModal() {
    document.getElementById('addClientForm').reset();
    this.populateLegalEntities(); // تحديث القائمة قبل الفتح
    this.handleLegalEntityChange(); // إعادة ضبط مربع "أخرى"
    new bootstrap.Modal(document.getElementById('addClientModal')).show();
  }

  static async addClient() {
    const name = document.getElementById('newClientName').value.trim();
    const taxId = document.getElementById('newClientTaxId').value.trim();
    
    // ⚡ تحديد الكيان القانوني (من القائمة أو من مربع "أخرى") ⚡
    const selectVal = document.getElementById('newClientLegalEntitySelect').value;
    const customVal = document.getElementById('newClientLegalEntityCustom').value.trim();
    const legalEntity = selectVal === 'other' ? customVal : selectVal;

    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري حفظ العميل...");
    try {
      const newClient = await ApiClient.call('api_addClient', name, taxId, legalEntity, userEmail);
      const updatedClients = [...state.clients, newClient];
      GlobalStore.setState({ clients: updatedClients });
      
      bootstrap.Modal.getInstance(document.getElementById('addClientModal')).hide();
      this.renderTable();
      UIManager.showSuccess("تم الحفظ بنجاح!");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }

  static async deleteClient(clientId, clientName) {
    const isConfirmed = await UIManager.confirmAction(`هل أنت متأكد من مسح العميل "${clientName}"؟`);
    if (!isConfirmed) return;
    UIManager.showLoader("جاري الحذف...");
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';
      await ApiClient.call('api_deleteClient', clientId, clientName, userEmail);
      const updatedClients = state.clients.map(c => { if (c.Main_ID === clientId) c.Is_Deleted = true; return c; });
      GlobalStore.setState({ clients: updatedClients });
      this.renderTable();
      UIManager.showSuccess("تم الحذف.");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}
</script>
