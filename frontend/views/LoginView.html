<div id="login-screen" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1000; align-items: center; justify-content: center; background: linear-gradient(135deg, #2c3e50, #3498db);">
  <div class="card shadow-lg border-0 fade-in" style="width: 400px; max-width: 90%; border-radius: 15px; overflow: hidden; background-color: var(--bs-body-bg);">
    <div class="card-header text-white text-center py-4" style="background: rgba(0,0,0,0.2); border:none;">
      <i class="fas fa-shield-alt fa-3x mb-3"></i>
      <h4 class="m-0 fw-bold">نظام الأرشيف الرقمي</h4>
      <small class="opacity-75">يرجى تسجيل الدخول للمتابعة</small>
    </div>
    <div class="card-body p-4">
      <form id="loginForm" onsubmit="event.preventDefault(); LoginController.processLogin();">
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="fas fa-user me-1 text-primary"></i> اسم المستخدم</label>
          <input type="text" id="loginUsername" class="form-control form-control-lg bg-light border-0" placeholder="Username" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold"><i class="fas fa-lock me-1 text-primary"></i> كلمة المرور</label>
          <input type="password" id="loginPassword" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required>
        </div>
        
        <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 shadow-sm position-relative">
          <span id="loginBtnText"><i class="fas fa-sign-in-alt me-2"></i> دخول للنظام</span>
          <span id="loginBtnSpinner" class="spinner-border spinner-border-sm position-absolute d-none" style="right: 20px; top: 35%;" role="status" aria-hidden="true"></span>
        </button>
      </form>
    </div>
    <div class="card-footer text-center bg-transparent border-0 pb-4 pt-0">
      <small class="text-muted fw-bold">جميع الحقوق محفوظة &copy; 2026</small>
    </div>
  </div>
</div>

<script>
class LoginController {
  static async processLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    const btnSpinner = document.getElementById('loginBtnSpinner');
    
    if(!user || !pass) {
      UIManager.showError("يرجى إدخال اسم المستخدم وكلمة المرور", "تنبيه");
      return;
    }
    
    // تفعيل حالة التحميل
    btn.disabled = true;
    btnText.textContent = 'جاري التحقق...';
    btnSpinner.classList.remove('d-none');
    
    try {
      const userData = await ApiClient.call('api_login', user, pass);
      localStorage.setItem('dms_session', JSON.stringify(userData));
      UIManager.showSuccess(`أهلاً بك يا ${userData.name}`);
      App.initUserSession(userData);
      
    } catch (error) {
      UIManager.showError(error.message, "فشل الدخول");
    } finally {
      // إرجاع الزرار لحالته
      btn.disabled = false;
      btnText.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> دخول للنظام';
      btnSpinner.classList.add('d-none');
    }
  }
}
</script>
