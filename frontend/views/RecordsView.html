<template id="records-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <div>
        <button class="btn btn-outline-secondary btn-sm me-3 shadow-sm" onclick="RecordController.goBack()">
          <i class="fas fa-arrow-right"></i> عودة للمجموعات
        </button>
        <h3 class="text-primary m-0 d-inline-block align-middle">
          <i class="fas fa-file-alt me-2"></i> السجلات <span id="currentGroupName" class="text-muted fs-5"></span>
        </h3>
      </div>
      <button class="btn btn-success shadow-sm" onclick="RecordController.showAddModal()">
        <i class="fas fa-plus"></i> إضافة سجل
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover text-center align-middle m-0">
              <thead class="table-dark">
                <tr>
                  <th>عنوان السجل</th>
                  <th>الوصف</th>
                  <th>الوسوم (Tags)</th>
                  <th>تاريخ الإضافة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addRecordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="fas fa-file-medical me-2"></i> إضافة سجل جديد</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addRecordForm" onsubmit="event.preventDefault(); RecordController.addRecord();">
            <div class="mb-3">
              <label class="form-label fw-bold">عنوان السجل <span class="text-danger">*</span></label>
              <input type="text" id="newRecordTitle" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">وصف مبسط (اختياري)</label>
              <textarea id="newRecordDesc" class="form-control" rows="2"></textarea>
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-bold">الوسوم (Tags)</label>
              <div class="d-flex align-items-start gap-2">
                <div class="flex-grow-1 border rounded p-2 bg-light min-vh-25" id="selectedTagsContainer" style="min-height: 45px;">
                  <!-- Selected tags will appear here -->
                </div>
                <button type="button" class="btn btn-outline-secondary" onclick="RecordController.openTagSelector()">
                  <i class="fas fa-tags"></i>
                </button>
                <button type="button" class="btn btn-outline-primary manage-tags-btn" onclick="RecordController.openManageTags()" style="display:none;">
                  <i class="fas fa-cog"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i> حفظ السجل</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Tag Selector Modal -->
  <div class="modal fade" id="tagSelectorModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title">اختر الوسوم</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="availableTagsList" class="d-flex flex-wrap gap-2">
            <!-- Available tags here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Manage Tags Modal -->
  <div class="modal fade" id="manageTagsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">إدارة الوسوم</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addTagForm" onsubmit="event.preventDefault(); RecordController.addNewTag();" class="mb-3 d-flex gap-2" style="display:none;">
            <input type="text" id="newTagName" class="form-control form-control-sm" placeholder="اسم التاج" required>
            <input type="color" id="newTagColor" class="form-control form-control-color form-control-sm" value="#0d6efd" title="اختر لون">
            <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i></button>
          </form>
          <div id="manageTagsList" class="list-group list-group-flush" style="max-height: 300px; overflow-y: auto;">
            <!-- Managed tags list -->
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
class RecordController {
  static currentGroupId = null;
  static parentClientId = null;

  static selectedTags = [];

  static applyPermissionsLocal() {
    const state = GlobalStore.getState();
    const role = state.currentUser?.role;
    let perms = {};
    if (state.currentUser?.permissions) {
      try { perms = typeof state.currentUser.permissions === 'string' ? JSON.parse(state.currentUser.permissions) : state.currentUser.permissions; } catch(e) {}
    }
    
    const canManageTags = role === 'Admin' || (perms.tags && (perms.tags.add || perms.tags.edit || perms.tags.delete));
    
    if (canManageTags) {
      document.querySelectorAll('.manage-tags-btn').forEach(b => b.style.display = 'block');
    } else {
      document.querySelectorAll('.manage-tags-btn').forEach(b => b.style.display = 'none');
    }
  }

  static renderSelectedTags() {
    const container = document.getElementById('selectedTagsContainer');
    if (!container) return;
    container.innerHTML = this.selectedTags.map(tag => `
      <span class="badge rounded-pill me-1 mb-1 shadow-sm border" style="background-color: ${tag.Color}; color: #fff;">
        ${tag.Name}
        <i class="fas fa-times ms-1 text-white-50" style="cursor:pointer;" onclick="RecordController.removeTag('${tag.Tag_ID}')"></i>
      </span>
    `).join('');
  }

  static removeTag(tagId) {
    this.selectedTags = this.selectedTags.filter(t => t.Tag_ID !== tagId);
    this.renderSelectedTags();
  }

  static openTagSelector() {
    const list = document.getElementById('availableTagsList');
    const tags = GlobalStore.getState().tags || [];
    const activeTags = tags.filter(t => String(t.Is_Deleted).toUpperCase() !== 'TRUE');
    
    list.innerHTML = activeTags.map(tag => {
      const isSelected = this.selectedTags.some(t => t.Tag_ID === tag.Tag_ID);
      return `
        <span class="badge rounded-pill border shadow-sm ${isSelected ? 'opacity-50' : ''}" 
              style="background-color: ${tag.Color}; color: #fff; cursor: ${isSelected ? 'not-allowed' : 'pointer'};"
              ${isSelected ? '' : `onclick="RecordController.selectTag('${tag.Tag_ID}')"`}>
          ${tag.Name} ${isSelected ? '<i class="fas fa-check ms-1"></i>' : ''}
        </span>
      `;
    }).join('');
    
    if (activeTags.length === 0) list.innerHTML = '<span class="text-muted small">لا توجد وسوم مسجلة، قم بإضافة وسوم أولاً.</span>';
    
    new bootstrap.Modal(document.getElementById('tagSelectorModal')).show();
  }

  static selectTag(tagId) {
    const tag = GlobalStore.getState().tags.find(t => t.Tag_ID === tagId);
    if (tag && !this.selectedTags.find(t => t.Tag_ID === tagId)) {
      this.selectedTags.push(tag);
      this.renderSelectedTags();
    }
    bootstrap.Modal.getInstance(document.getElementById('tagSelectorModal')).hide();
  }

  static openManageTags() {
    this.renderManageTagsList();
    new bootstrap.Modal(document.getElementById('manageTagsModal')).show();
  }

  static renderManageTagsList() {
    const list = document.getElementById('manageTagsList');
    const tags = GlobalStore.getState().tags || [];
    const activeTags = tags.filter(t => String(t.Is_Deleted).toUpperCase() !== 'TRUE');
    
    const state = GlobalStore.getState();
    const role = state.currentUser?.role;
    let perms = {};
    if (state.currentUser?.permissions) {
      try { perms = typeof state.currentUser.permissions === 'string' ? JSON.parse(state.currentUser.permissions) : state.currentUser.permissions; } catch(e) {}
    }
    
    const canAdd = role === 'Admin' || (perms.tags && perms.tags.add);
    const canEdit = role === 'Admin' || (perms.tags && perms.tags.edit);
    const canDelete = role === 'Admin' || (perms.tags && perms.tags.delete);
    
    document.getElementById('addTagForm').style.display = canAdd ? 'flex' : 'none';
    
    list.innerHTML = activeTags.map(tag => `
      <div class="list-group-item d-flex justify-content-between align-items-center px-1">
        <div>
          ${canEdit ? `<input type="color" class="form-control form-control-color form-control-sm d-inline-block p-0 me-2" 
                 style="width: 20px; height: 20px;" value="${tag.Color}" onchange="RecordController.updateTagColor('${tag.Tag_ID}', this.value)">` 
                 : `<span class="d-inline-block me-2 rounded-circle" style="width:15px; height:15px; background-color:${tag.Color};"></span>`}
          <span class="fw-bold small">${tag.Name}</span>
        </div>
        ${canDelete ? `<button class="btn btn-sm btn-link text-danger p-0 m-0" onclick="RecordController.deleteTag('${tag.Tag_ID}', '${tag.Name}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
    `).join('');
  }

  static async addNewTag() {
    const name = document.getElementById('newTagName').value.trim();
    const color = document.getElementById('newTagColor').value;
    if (!name) return;
    
    const userEmail = GlobalStore.getState().currentUser?.username;
    UIManager.showLoader("جاري إضافة التاج...");
    try {
      const newTag = await ApiClient.call('api_addTag', name, color, userEmail);
      GlobalStore.setState({ tags: [...(GlobalStore.getState().tags || []), newTag] });
      document.getElementById('addTagForm').reset();
      this.renderManageTagsList();
      UIManager.hideLoader();
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static async updateTagColor(tagId, newColor) {
    const tag = GlobalStore.getState().tags.find(t => t.Tag_ID === tagId);
    if(!tag) return;
    const userEmail = GlobalStore.getState().currentUser?.username;
    try {
      await ApiClient.call('api_updateTag', tagId, tag.Name, newColor, userEmail);
      const updatedTags = GlobalStore.getState().tags.map(t => t.Tag_ID === tagId ? { ...t, Color: newColor } : t);
      GlobalStore.setState({ tags: updatedTags });
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static async deleteTag(tagId, name) {
    const ok = await UIManager.confirmAction(`هل أنت متأكد من حذف التاج ${name}؟`);
    if(!ok) return;
    
    const userEmail = GlobalStore.getState().currentUser?.username;
    UIManager.showLoader("جاري مسح التاج...");
    try {
      await ApiClient.call('api_deleteTag', tagId, name, userEmail);
      const tags = GlobalStore.getState().tags.map(t => t.Tag_ID === tagId ? {...t, Is_Deleted: true} : t);
      GlobalStore.setState({ tags });
      
      // Remove from selected if it was there
      this.selectedTags = this.selectedTags.filter(t => t.Tag_ID !== tagId);
      this.renderSelectedTags();
      
      this.renderManageTagsList();
      UIManager.hideLoader();
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static renderView(groupId) {
    if (!groupId) { App.navigate('clients'); return; }
    this.currentGroupId = groupId;
    const group = GlobalStore.getState().groups.find(g => g.Group_ID === groupId);
    if (group) {
      this.parentClientId = group.Client_ID;
      document.getElementById('currentGroupName').textContent = `(المجموعة: ${group.Name})`;
    }
    this.renderTable();
  }

  static goBack() {
    if (this.parentClientId) App.navigate('groups', this.parentClientId);
    else App.navigate('clients');
  }

  static renderTable() {
    const tbody = document.getElementById('recordsTableBody');
    if (!tbody) return;
    const groupRecords = (GlobalStore.getState().records || []).filter(r => 
      r.Group_ID === this.currentGroupId && String(r.Is_Deleted).toUpperCase() !== "TRUE"
    );

    if (groupRecords.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-box-open fa-3x mb-3 d-block text-black-50"></i> لا توجد سجلات.</td></tr>`;
      return;
    }
    
    // Helper to render tags
    const renderTagsBadge = (tagsStr) => {
      if(!tagsStr) return '-';
      try {
        const tagIds = JSON.parse(tagsStr);
        const allTags = GlobalStore.getState().tags || [];
        return tagIds.map(id => {
          const t = allTags.find(tag => tag.Tag_ID === id);
          if (t) return `<span class="badge rounded-pill me-1 mb-1 border shadow-sm" style="background-color:${t.Color}; color:#fff;">${t.Name}</span>`;
          return '';
        }).join('');
      } catch (e) {
        return `<span class="badge bg-secondary">${tagsStr}</span>`;
      }
    };

    tbody.innerHTML = groupRecords.map(record => `
      <tr>
        <td class="fw-bold text-primary">${record.Title}</td>
        <td class="text-muted">${record.Description || '-'}</td>
        <td style="max-width:200px; white-space:normal;">${renderTagsBadge(record.Tags)}</td>
        <td class="text-muted small">${record.Created_At.split(',')[0]}</td>
        <td>
          <button class="btn btn-sm btn-info text-white me-1 shadow-sm" onclick="App.navigate('attachments', '${record.Record_ID}')"><i class="fas fa-paperclip"></i> المرفقات</button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="RecordController.deleteRecord('${record.Record_ID}', '${record.Title}')"><i class="fas fa-trash-alt"></i></button>
        </td>
      </tr>
    `).join('');
    App.applyPermissions();
    this.applyPermissionsLocal();
  }

  static showAddModal() {
    document.getElementById('addRecordForm').reset();
    this.selectedTags = [];
    this.renderSelectedTags();
    new bootstrap.Modal(document.getElementById('addRecordModal')).show();
  }

  static async addRecord() {
    const title = document.getElementById('newRecordTitle').value.trim();
    const desc = document.getElementById('newRecordDesc').value.trim();
    
    // ⚡ تحديد الوسم ⚡
    const tagsArr = this.selectedTags.map(t => t.Tag_ID);
    const tags = JSON.stringify(tagsArr);
    
    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري حفظ السجل...");
    try {
      const newRecord = await ApiClient.call('api_addRecord', this.currentGroupId, title, desc, tags, userEmail);
      const updatedRecords = [...state.records, newRecord];
      GlobalStore.setState({ records: updatedRecords });
      
      bootstrap.Modal.getInstance(document.getElementById('addRecordModal')).hide();
      this.renderTable();
      UIManager.showSuccess("تم إضافة السجل بنجاح!");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }

  static async deleteRecord(recordId, title) {
    const isConfirmed = await UIManager.confirmAction(`هل تريد بالتأكيد حذف السجل "${title}"؟`);
    if (!isConfirmed) return;
    UIManager.showLoader("جاري الحذف...");
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';
      await ApiClient.call('api_deleteRecord', recordId, title, userEmail);
      const updatedRecords = state.records.map(r => r.Record_ID === recordId ? { ...r, Is_Deleted: true } : r);
      GlobalStore.setState({ records: updatedRecords });
      this.renderTable();
      UIManager.showSuccess("تم نقل السجل للمهملات.");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}
</script>
