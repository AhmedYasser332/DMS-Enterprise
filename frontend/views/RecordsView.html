<template id="records-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <div>
        <button class="btn btn-outline-secondary btn-sm me-3 shadow-sm" onclick="RecordController.goBack()">
          <i class="fas fa-arrow-right"></i> عودة للمجموعات
        </button>
        <h3 class="text-primary m-0 d-inline-block align-middle">
          <i class="fas fa-file-alt me-2"></i> السجلات <span id="currentGroupName" class="text-muted fs-5"></span>
        </h3>
      </div>
      <button class="btn btn-success shadow-sm" onclick="RecordController.showAddModal()">
        <i class="fas fa-plus"></i> إضافة سجل
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0 rounded-lg">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover text-center align-middle m-0">
              <thead class="table-dark">
                <tr>
                  <th>عنوان السجل</th>
                  <th>الوصف</th>
                  <th>الوسوم (Tags)</th>
                  <th>تاريخ الإضافة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addRecordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="fas fa-file-medical me-2"></i> إضافة سجل جديد</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addRecordForm" onsubmit="event.preventDefault(); RecordController.addRecord();">
            <div class="mb-3">
              <label class="form-label fw-bold">عنوان السجل <span class="text-danger">*</span></label>
              <input type="text" id="newRecordTitle" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">وصف مبسط (اختياري)</label>
              <textarea id="newRecordDesc" class="form-control" rows="2"></textarea>
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-bold">وسوم للبحث (Tags)</label>
              <select id="newRecordTagsSelect" class="form-select" onchange="RecordController.handleTagsChange()">
                </select>
              <input type="text" id="newRecordTagsCustom" class="form-control mt-2 d-none fade-in" placeholder="مثال: ضرايب, عاجل, مراجعة (افصل بفاصلة لعدة وسوم)">
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i> حفظ السجل</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
class RecordController {
  static currentGroupId = null;
  static parentClientId = null;

  // دالة إظهار مربع الوسوم المخصصة
  static handleTagsChange() {
    const select = document.getElementById('newRecordTagsSelect');
    const customInput = document.getElementById('newRecordTagsCustom');
    if (select.value === 'other') {
      customInput.classList.remove('d-none');
    } else {
      customInput.classList.add('d-none');
      customInput.value = '';
    }
  }

  // تجميع الوسوم من النظام لعرضها في القائمة
  static populateTags() {
    const select = document.getElementById('newRecordTagsSelect');
    const defaultTags = ['عام', 'ضريبي', 'قانوني', 'مالي', 'إداري', 'عاجل'];
    
    const state = GlobalStore.getState();
    let existingTags = [];
    
    // استخراج كل الوسوم وتقسيمها لو كانت مفصولة بفاصلة
    (state.records || []).forEach(r => {
      if (r.Tags) {
        r.Tags.split(',').forEach(t => {
          const cleanTag = t.trim();
          if (cleanTag) existingTags.push(cleanTag);
        });
      }
    });
    
    const allTags = [...new Set([...defaultTags, ...existingTags])];
    
    select.innerHTML = '<option value="">-- بدون وسوم --</option>' + 
      allTags.map(t => `<option value="${t}">${t}</option>`).join('') +
      '<option value="other" class="text-primary fw-bold">➕ أخرى (كتابة وسوم مخصصة)...</option>';
  }

  static renderView(groupId) {
    if (!groupId) { App.navigate('clients'); return; }
    this.currentGroupId = groupId;
    const group = GlobalStore.getState().groups.find(g => g.Group_ID === groupId);
    if (group) {
      this.parentClientId = group.Main_ID;
      document.getElementById('currentGroupName').textContent = `(المجموعة: ${group.Name})`;
    }
    this.renderTable();
  }

  static goBack() {
    if (this.parentClientId) App.navigate('groups', this.parentClientId);
    else App.navigate('clients');
  }

  static renderTable() {
    const tbody = document.getElementById('recordsTableBody');
    if (!tbody) return;
    const groupRecords = (GlobalStore.getState().records || []).filter(r => 
      r.Sub_ID === this.currentGroupId && String(r.Is_Deleted).toUpperCase() !== "TRUE"
    );

    if (groupRecords.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-5"><i class="fas fa-box-open fa-3x mb-3 d-block text-black-50"></i> لا توجد سجلات.</td></tr>`;
      return;
    }

    tbody.innerHTML = groupRecords.map(record => `
      <tr>
        <td class="fw-bold text-primary">${record.Title}</td>
        <td class="text-muted">${record.Description || '-'}</td>
        <td>${record.Tags ? `<span class="badge bg-warning text-dark">${record.Tags}</span>` : '-'}</td>
        <td class="text-muted small">${record.Created_At.split(',')[0]}</td>
        <td>
          <button class="btn btn-sm btn-info text-white me-1 shadow-sm" onclick="App.navigate('attachments', '${record.Record_ID}')"><i class="fas fa-paperclip"></i> المرفقات</button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="RecordController.deleteRecord('${record.Record_ID}', '${record.Title}')"><i class="fas fa-trash-alt"></i></button>
        </td>
      </tr>
    `).join('');
    App.applyPermissions();
  }

  static showAddModal() {
    document.getElementById('addRecordForm').reset();
    this.populateTags(); // تحديث قائمة الوسوم
    this.handleTagsChange(); // إعادة ضبط الرؤية
    new bootstrap.Modal(document.getElementById('addRecordModal')).show();
  }

  static async addRecord() {
    const title = document.getElementById('newRecordTitle').value.trim();
    const desc = document.getElementById('newRecordDesc').value.trim();
    
    // ⚡ تحديد الوسم ⚡
    const selectVal = document.getElementById('newRecordTagsSelect').value;
    const customVal = document.getElementById('newRecordTagsCustom').value.trim();
    const tags = selectVal === 'other' ? customVal : selectVal;
    
    const state = GlobalStore.getState();
    const userEmail = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري حفظ السجل...");
    try {
      const newRecord = await ApiClient.call('api_addRecord', this.currentGroupId, title, desc, tags, userEmail);
      const updatedRecords = [...state.records, newRecord];
      GlobalStore.setState({ records: updatedRecords });
      
      bootstrap.Modal.getInstance(document.getElementById('addRecordModal')).hide();
      this.renderTable();
      UIManager.showSuccess("تم إضافة السجل بنجاح!");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }

  static async deleteRecord(recordId, title) {
    const isConfirmed = await UIManager.confirmAction(`هل تريد بالتأكيد حذف السجل "${title}"؟`);
    if (!isConfirmed) return;
    UIManager.showLoader("جاري الحذف...");
    try {
      const state = GlobalStore.getState();
      const userEmail = state.currentUser ? state.currentUser.username : 'System';
      await ApiClient.call('api_deleteRecord', recordId, title, userEmail);
      const updatedRecords = state.records.map(r => { if (r.Record_ID === recordId) r.Is_Deleted = true; return r; });
      GlobalStore.setState({ records: updatedRecords });
      this.renderTable();
      UIManager.showSuccess("تم نقل السجل للمهملات.");
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}
</script>
