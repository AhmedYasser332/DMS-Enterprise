<template id="trash-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 border-bottom pb-2">
      <h3 class="text-danger m-0"><i class="fas fa-trash-alt me-2"></i> سلة المهملات</h3>
      <small class="text-muted">هنا يمكنك استعادة العناصر المحذوفة أو حذفها نهائياً من قاعدة البيانات.</small>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <table class="table table-hover text-center align-middle m-0">
            <thead class="table-light text-danger">
              <tr>
                <th>النوع</th>
                <th>الاسم / العنوان</th>
                <th>تاريخ الحذف</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="trashTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</template>

<script>

class TrashController {
  // 1. رسم الجدول من الذاكرة المركزية مباشرة بدون تحميل
  static renderTable() {
    const tbody = document.getElementById('trashTableBody');
    if (!tbody) return;

    const state = GlobalStore.getState();
    let items = [];

    // فلترة وجمع كل العناصر المحذوفة من جميع الأقسام
    (state.clients || []).filter(c => String(c.Is_Deleted).toUpperCase() === "TRUE")
      .forEach(c => items.push({ type: 'عميل', display: c.Name, id: c.Main_ID, Created_At: c.Created_At }));

    (state.groups || []).filter(g => String(g.Is_Deleted).toUpperCase() === "TRUE")
      .forEach(g => items.push({ type: 'مجموعة', display: g.Name, id: g.Group_ID, Created_At: g.Created_At }));

    (state.records || []).filter(r => String(r.Is_Deleted).toUpperCase() === "TRUE")
      .forEach(r => items.push({ type: 'سجل', display: r.Title, id: r.Record_ID, Created_At: r.Created_At }));

    (state.attachments || []).filter(a => String(a.Is_Deleted).toUpperCase() === "TRUE")
      .forEach(a => items.push({ type: 'مرفق', display: a.File_Name, id: a.File_ID, Created_At: a.Uploaded_At }));

    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="py-5 text-muted"><i class="fas fa-trash-restore fa-3x mb-3 d-block text-black-50"></i> سلة المهملات فارغة.</td></tr>';
      return;
    }

    tbody.innerHTML = items.map(item => `
      <tr>
        <td><span class="badge bg-secondary">${item.type}</span></td>
        <td class="fw-bold">${item.display}</td>
        <td class="small text-muted">${item.Created_At ? item.Created_At.split(',')[0] : '-'}</td>
        <td>
          <button class="btn btn-sm btn-success shadow-sm me-1" onclick="TrashController.restore('${item.type}', '${item.id}', '${item.display}')">
            <i class="fas fa-undo"></i> استعادة
          </button>
          <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="TrashController.hardDelete('${item.type}', '${item.id}', '${item.display}')">
            <i class="fas fa-times"></i> حذف نهائي
          </button>
        </td>
      </tr>
    `).join('');
  }

  // 2. استعادة العنصر (مع تحديث الذاكرة محلياً للسرعة)
  static async restore(type, id, name) {
    const state = GlobalStore.getState();
    const user = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري الاستعادة...");
    try {
      await ApiClient.call('api_restoreItem', type, id, name, user);
      
      // تحديث الـ Store محلياً عشان السرعة (بنشيل علامة Is_Deleted)
      if (type === 'عميل') GlobalStore.setState({ clients: state.clients.map(c => c.Main_ID === id ? { ...c, Is_Deleted: false } : c) });
      else if (type === 'مجموعة') GlobalStore.setState({ groups: state.groups.map(g => g.Group_ID === id ? { ...g, Is_Deleted: false } : g) });
      else if (type === 'سجل') GlobalStore.setState({ records: state.records.map(r => r.Record_ID === id ? { ...r, Is_Deleted: false } : r) });
      else if (type === 'مرفق') GlobalStore.setState({ attachments: state.attachments.map(a => a.File_ID === id ? { ...a, Is_Deleted: false } : a) });

      UIManager.showSuccess("تمت استعادة العنصر بنجاح");
      this.renderTable();
    } catch (error) {
      UIManager.showError(error.message);
    }
  }

  // 3. حذف نهائي (مع إزالته من الذاكرة محلياً)
  static async hardDelete(type, id, name) {
    const ok = await UIManager.confirmAction(`تحذير: سيتم حذف "${name}" نهائياً ولن تتمكن من استعادته!`);
    if (!ok) return;

    const state = GlobalStore.getState();
    const user = state.currentUser ? state.currentUser.username : 'System';

    UIManager.showLoader("جاري الحذف النهائي...");
    try {
      await ApiClient.call('api_permanentDelete', type, id, name, user);
      
      // حذفه من الـ Store محلياً بالكامل
      if (type === 'عميل') GlobalStore.setState({ clients: state.clients.filter(c => c.Main_ID !== id) });
      else if (type === 'مجموعة') GlobalStore.setState({ groups: state.groups.filter(g => g.Group_ID !== id) });
      else if (type === 'سجل') GlobalStore.setState({ records: state.records.filter(r => r.Record_ID !== id) });
      else if (type === 'مرفق') GlobalStore.setState({ attachments: state.attachments.filter(a => a.File_ID !== id) });

      UIManager.showSuccess("تم الحذف النهائي");
      this.renderTable();
    } catch (error) {
      UIManager.showError(error.message);
    }
  }
}

</script>
