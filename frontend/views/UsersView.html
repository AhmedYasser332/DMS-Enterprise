<template id="users-view-template">
  <div class="row fade-in">
    <div class="col-12 mb-3 d-flex justify-content-between align-items-center border-bottom pb-2">
      <h3 class="text-info m-0"><i class="fas fa-user-shield me-2"></i> إدارة المستخدمين والصلاحيات</h3>
      <button class="btn btn-info text-white shadow-sm" onclick="UserController.showAddModal()">
        <i class="fas fa-user-plus"></i> مستخدم جديد
      </button>
    </div>
    
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-responsive">
          <table class="table table-hover text-center align-middle m-0">
            <thead class="table-dark">
              <tr>
                <th>الاسم</th>
                <th>اسم الدخول</th>
                <th>الصلاحية</th>
                <th>الحالة</th>
                <th>تاريخ الإضافة</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Add User -->
  <div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-info text-white">
          <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i> إضافة مستخدم</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="addUserForm" onsubmit="event.preventDefault(); UserController.addUser();">
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">الاسم بالكامل</label><input type="text" id="nuName" class="form-control" required></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">اسم الدخول</label><input type="text" id="nuUsername" class="form-control" required></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">كلمة المرور</label><input type="password" id="nuPassword" class="form-control" required></div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">الدور (Role)</label>
                <select id="nuRole" class="form-select" onchange="UserController.handleRoleChange('nu')">
                  <option value="Viewer">مشاهد فقط (Viewer)</option>
                  <option value="User">مستخدم (User)</option>
                  <option value="Admin">مدير نظام (Admin)</option>
                </select>
              </div>
              <div class="col-12 mb-3">
                <label class="form-label fw-bold">العملاء المسموح بهم</label>
                <div class="card p-2 bg-light border-0" style="max-height: 150px; overflow-y: auto;">
                  <div class="form-check border-bottom pb-2 mb-2">
                    <input class="form-check-input" type="checkbox" id="nuAllowedAll" onchange="UserController.toggleAllClients('nu')">
                    <label class="form-check-label fw-bold text-primary">تحديد الكل (ALL)</label>
                  </div>
                  <div id="nuClientsList" class="row px-2"></div>
                </div>
                <input type="hidden" id="nuAllowed">
              </div>
            </div>

            <!-- Permissions Block Add -->
            <div class="mb-4">
              <label class="form-label fw-bold text-primary mb-3"><i class="fas fa-shield-alt me-2"></i>الصلاحيات المخصصة</label>
              <div class="row g-3">
                
                <!-- لوحة التحكم -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-tachometer-alt me-2 text-primary"></i>لوحة التحكم</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="dashboard" data-act="view" id="nu_p_db_vw"><label class="form-check-label" for="nu_p_db_vw">الدخول للوحة التحكم</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm" type="checkbox" data-cat="dashboard" data-act="viewKPIs" id="nu_p_db_vk"><label class="form-check-label" for="nu_p_db_vk">رؤية الإحصائيات (KPIs)</label></div>
                  </div>
                </div>

                <!-- إدارة العملاء -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-users me-2 text-primary"></i>إدارة العملاء والمجموعات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="clients" data-act="add" id="nu_p_cl_add"><label class="form-check-label" for="nu_p_cl_add">إضافة</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="clients" data-act="edit" id="nu_p_cl_edit"><label class="form-check-label" for="nu_p_cl_edit">تعديل</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="clients" data-act="delete" id="nu_p_cl_del"><label class="form-check-label text-danger" for="nu_p_cl_del">حذف</label></div>
                  </div>
                </div>

                <!-- المهام -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-tasks me-2 text-primary"></i>المهام</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="tasks" data-act="myTasks" id="nu_p_tk_my"><label class="form-check-label" for="nu_p_tk_my">مهامي الشخصية</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-info" type="checkbox" data-cat="tasks" data-act="manageTasks" id="nu_p_tk_mt"><label class="form-check-label text-info fw-bold" for="nu_p_tk_mt">إدارة المهام (Admin)</label></div>
                  </div>
                </div>

                <!-- بيانات الدخول (Credentials) -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm border-start border-warning border-3" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-key me-2 text-warning"></i>بيانات الدخول (حساس)</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="credentials" data-act="view" id="nu_p_cr_vw"><label class="form-check-label" for="nu_p_cr_vw">رؤية الكلمات (View)</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="credentials" data-act="add" id="nu_p_cr_add"><label class="form-check-label" for="nu_p_cr_add">إضافة</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="credentials" data-act="edit" id="nu_p_cr_ed"><label class="form-check-label" for="nu_p_cr_ed">تعديل</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="credentials" data-act="delete" id="nu_p_cr_del"><label class="form-check-label text-danger" for="nu_p_cr_del">حذف</label></div>
                  </div>
                </div>

                <!-- إدارة السجلات -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-folder-open me-2 text-primary"></i>إدارة السجلات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="records" data-act="add" id="nu_p_rc_add"><label class="form-check-label" for="nu_p_rc_add">إضافة</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="records" data-act="edit" id="nu_p_rc_edit"><label class="form-check-label" for="nu_p_rc_edit">تعديل</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="records" data-act="delete" id="nu_p_rc_del"><label class="form-check-label text-danger" for="nu_p_rc_del">حذف</label></div>
                  </div>
                </div>

                <!-- إدارة المرفقات -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-paperclip me-2 text-primary"></i>إدارة المرفقات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="attachments" data-act="upload" id="nu_p_at_up"><label class="form-check-label" for="nu_p_at_up">رفع</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="attachments" data-act="download" id="nu_p_at_dl"><label class="form-check-label" for="nu_p_at_dl">تحميل</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="attachments" data-act="print" id="nu_p_at_pr"><label class="form-check-label" for="nu_p_at_pr">طباعة</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="attachments" data-act="delete" id="nu_p_at_del"><label class="form-check-label text-danger" for="nu_p_at_del">حذف</label></div>
                  </div>
                </div>

                <!-- النظام المتقدم (Admin) -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm border-start border-danger border-3" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-cogs me-2 text-danger"></i>إدارة النظام (Admin)</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="admin" data-act="manageUsers" id="nu_p_ad_mu"><label class="form-check-label text-danger fw-bold" for="nu_p_ad_mu">إدارة المستخدمين</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="admin" data-act="manageTemplates" id="nu_p_ad_mt"><label class="form-check-label fw-bold" for="nu_p_ad_mt">إدارة قوالب المهام</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="admin" data-act="viewLogs" id="nu_p_ad_vl"><label class="form-check-label fw-bold" for="nu_p_ad_vl">سجل التغييرات (Logs)</label></div>
                  </div>
                </div>

                <!-- سلة المهملات -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-trash me-2 text-primary"></i>سلة المهملات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="recycleBin" data-act="view" id="nu_p_rb_vw"><label class="form-check-label" for="nu_p_rb_vw">عرض السلة</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="recycleBin" data-act="restoreOwn" id="nu_p_rb_ro"><label class="form-check-label" for="nu_p_rb_ro">استرجاع ملفاتي</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="recycleBin" data-act="restoreAll" id="nu_p_rb_ra"><label class="form-check-label" for="nu_p_rb_ra">استرجاع الكل</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="recycleBin" data-act="empty" id="nu_p_rb_em"><label class="form-check-label text-danger fw-bold" for="nu_p_rb_em">تفريغ السلة نهائياً</label></div>
                  </div>
                </div>

                <!-- الوسوم والكيانات -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-sliders-h me-2 text-primary"></i>الوسوم والكيانات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="tags" data-act="add" id="nu_p_tg_add"><label class="form-check-label" for="nu_p_tg_add">إضافة وسوم (Tags)</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="tags" data-act="delete" id="nu_p_tg_del"><label class="form-check-label text-danger" for="nu_p_tg_del">حذف وسوم (Tags)</label></div>
                    <div class="form-check mb-2"><input class="form-check-input nu-perm" type="checkbox" data-cat="legalEntities" data-act="add" id="nu_p_le_add"><label class="form-check-label" for="nu_p_le_add">إضافة كيانات قانونية</label></div>
                    <div class="form-check"><input class="form-check-input nu-perm text-danger" type="checkbox" data-cat="legalEntities" data-act="delete" id="nu_p_le_del"><label class="form-check-label text-danger" for="nu_p_le_del">حذف كيانات قانونية</label></div>
                  </div>
                </div>

              </div>
            </div>

            <button type="submit" class="btn btn-info text-white btn-lg w-100 shadow-sm"><i class="fas fa-save me-2"></i>حفظ المستخدم</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Edit User -->
  <div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-warning text-dark">
          <h5 class="modal-title"><i class="fas fa-user-edit me-2"></i> تعديل مستخدم</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="editUserForm" onsubmit="event.preventDefault(); UserController.updateUser();">
            <input type="hidden" id="euId">
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">الاسم بالكامل</label><input type="text" id="euName" class="form-control" required></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">اسم الدخول</label><input type="text" id="euUsername" class="form-control" required></div>
              
              <div class="col-md-6 mb-3">

                <select id="euRole" class="form-select" onchange="UserController.handleRoleChange('eu')">
                  <option value="Viewer">مشاهد فقط (Viewer)</option>

                  <option value="Admin">مدير نظام (Admin)</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold text-danger">تغيير كلمة المرور</label>
                <button type="button" class="btn btn-outline-danger w-100" onclick="UserController.resetPasswordPrompt()">
                  <i class="fas fa-key me-2"></i> إعادة ضبط كلمة المرور
                </button>
              </div>
              <div class="col-12 mb-3">
                <label class="form-label fw-bold">العملاء المسموح بهم</label>
                <div class="card p-2 bg-light border-0" style="max-height: 150px; overflow-y: auto;">
                  <div class="form-check border-bottom pb-2 mb-2">
                    <input class="form-check-input" type="checkbox" id="euAllowedAll" onchange="UserController.toggleAllClients('eu')">
                    <label class="form-check-label fw-bold text-primary">تحديد الكل (ALL)</label>
                  </div>
                  <div id="euClientsList" class="row px-2"></div>
                </div>
                <input type="hidden" id="euAllowed">
              </div>
            </div>

            <!-- Permissions Block Edit -->
            <div class="mb-4">
              <label class="form-label fw-bold text-primary mb-3"><i class="fas fa-shield-alt me-2"></i>الصلاحيات المخصصة</label>
              <div class="row g-3">
                
                <!-- لوحة التحكم -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-tachometer-alt me-2 text-primary"></i>لوحة التحكم</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="dashboard" data-act="view" id="eu_p_db_vw"><label class="form-check-label" for="eu_p_db_vw">الدخول للوحة التحكم</label></div>
                    <div class="form-check"><input class="form-check-input eu-perm" type="checkbox" data-cat="dashboard" data-act="viewKPIs" id="eu_p_db_vk"><label class="form-check-label" for="eu_p_db_vk">رؤية الإحصائيات (KPIs)</label></div>
                  </div>
                </div>

                <!-- إدارة العملاء -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-users me-2 text-primary"></i>إدارة العملاء والمجموعات</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>
                    </div>
                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="clients" data-act="add" id="eu_p_cl_add"><label class="form-check-label" for="eu_p_cl_add">إضافة</label></div>
                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="clients" data-act="edit" id="eu_p_cl_edit"><label class="form-check-label" for="eu_p_cl_edit">تعديل</label></div>
                    <div class="form-check"><input class="form-check-input eu-perm text-danger" type="checkbox" data-cat="clients" data-act="delete" id="eu_p_cl_del"><label class="form-check-label text-danger" for="eu_p_cl_del">حذف</label></div>
                  </div>
                </div>

                <!-- المهام -->
                <div class="col-md-4">
                  <div class="card bg-body-tertiary border-0 h-100 p-3 shadow-sm" style="border-radius: 12px;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                      <h6 class="fw-bold m-0" style="color: var(--text-main);"><i class="fas fa-tasks me-2 text-primary"></i>المهام</h6>
                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>

                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="tasks" data-act="myTasks" id="eu_p_tk_my"><label class="form-check-label" for="eu_p_tk_my">مهامي الشخصية</label></div>

                      <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size: 0.75rem;" onclick="UserController.toggleCardPerms(this)">تحديد الكل</button>

                    <div class="form-check"><input class="form-check-input eu-perm text-danger" type="checkbox" data-cat="admin" data-act="viewLogs" id="eu_p_ad_vl"><label class="form-check-label fw-bold" for="eu_p_ad_vl">سجل التغييرات (Logs)</label></div>

                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="recycleBin" data-act="restoreOwn" id="eu_p_rb_ro"><label class="form-check-label" for="eu_p_rb_ro">استرجاع ملفاتي</label></div>
                    <div class="form-check mb-2"><input class="form-check-input eu-perm" type="checkbox" data-cat="recycleBin" data-act="restoreAll" id="eu_p_rb_ra"><label class="form-check-label" for="eu_p_rb_ra">استرجاع الكل</label></div>

                <!-- الوسوم والكيانات -->
                <div class="col-md-4">

                    <div class="form-check mb-2"><input class="form-check-input eu-perm text-danger" type="checkbox" data-cat="tags" data-act="delete" id="eu_p_tg_del"><label class="form-check-label text-danger" for="eu_p_tg_del">حذف وسوم (Tags)</label></div>

                    <div class="form-check"><input class="form-check-input eu-perm text-danger" type="checkbox" data-cat="legalEntities" data-act="delete" id="eu_p_le_del"><label class="form-check-label text-danger" for="eu_p_le_del">حذف كيانات قانونية</label></div>

</template>

<script>
class UserController {
  static toggleCardPerms(btn) {
    const card = btn.closest('.card');
    const checkboxes = card.querySelectorAll('input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => cb.checked = !allChecked);
  }

  static async toggleActive(userId, currentStatus) {
    const newStatus = !(String(currentStatus).toUpperCase() === 'TRUE');
    UIManager.showLoader(newStatus ? "جاري تفعيل الحساب..." : "جاري إيقاف الحساب...");
    try {
      const adminEmail = GlobalStore.getState().currentUser.username;
      const success = await ApiClient.call('api_updateUser', userId, { Is_Active: newStatus }, adminEmail);
      if (success) {
        const updatedUsers = GlobalStore.getState().users.map(u => {
           if (u.User_ID == userId) return { ...u, Is_Active: newStatus };
           return u;
        });
        GlobalStore.setState({ users: updatedUsers });
        this.renderTable();
        UIManager.showSuccess(newStatus ? "تم تفعيل الحساب بنجاح" : "تم إيقاف الحساب بنجاح");
      }
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static renderTable() {
    const tbody = document.getElementById('usersTableBody');
    const users = GlobalStore.getState().users || [];
    
    // Filter out deleted users for the view (though backend shouldn't send them, good practice to double check)
    const activeUsers = users.filter(u => String(u.Is_Deleted).toUpperCase() !== 'TRUE');

    tbody.innerHTML = activeUsers.map(u => `
      <tr>
        <td class="fw-bold text-primary">${u.Name}</td>
        <td>${u.Username}</td>
        <td><span class="badge ${u.Role === 'Admin' ? 'bg-danger' : (u.Role === 'User' ? 'bg-success' : 'bg-secondary')}">${u.Role}</span></td>
        <td>${String(u.Is_Active).toUpperCase() === 'TRUE' ? '<span class="text-success"><i class="fas fa-check-circle"></i> نشط</span>' : '<span class="text-danger"><i class="fas fa-times-circle"></i> موقوف</span>'}</td>
        <td class="text-muted small">${(u.Created_At || '').split(',')[0]}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary mx-1" onclick="UserController.showEditModal('${u.User_ID}')" title="تعديل"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-${String(u.Is_Active).toUpperCase() === 'TRUE' ? 'warning' : 'success'} mx-1" onclick="UserController.toggleActive('${u.User_ID}', '${u.Is_Active}')" title="${String(u.Is_Active).toUpperCase() === 'TRUE' ? 'إيقاف الحساب' : 'تفعيل الحساب'}"><i class="fas ${String(u.Is_Active).toUpperCase() === 'TRUE' ? 'fa-ban' : 'fa-check'}"></i></button>
          <button class="btn btn-sm btn-outline-danger mx-1" onclick="UserController.confirmDelete('${u.User_ID}')" title="حذف للمهملات"><i class="fas fa-trash-alt"></i></button>
        </td>
      </tr>
    `).join('');
  }

  static handleRoleChange(prefix) {
    const role = document.getElementById(`${prefix}Role`).value;
    const perms = this.defaultPermissions[role];
    this.setCheckboxes(prefix, perms);
  }

  static setCheckboxes(prefix, permsObj) {
    const checkboxes = document.querySelectorAll(`.${prefix}-perm`);
    checkboxes.forEach(cb => {
      const cat = cb.getAttribute('data-cat');
      const act = cb.getAttribute('data-act');
      if (permsObj && permsObj[cat] && permsObj[cat][act] !== undefined) {
        cb.checked = permsObj[cat][act];
      } else {
        cb.checked = false;
      }
    });
  }

  static getCheckboxesState(prefix) {
    const perms = {
      dashboard: { view: false, viewKPIs: false },
      clients: { add: false, edit: false, delete: false },
      records: { add: false, edit: false, delete: false },
      attachments: { upload: false, download: false, print: false, delete: false },
      recycleBin: { view: false, restoreOwn: false, restoreAll: false, empty: false },
      admin: { manageUsers: false, manageTemplates: false, viewLogs: false },
      tags: { add: false, edit: false, delete: false },
      legalEntities: { add: false, edit: false, delete: false },
      tasks: { manageTasks: false, myTasks: false },
      credentials: { view: false, add: false, edit: false, delete: false }
    };
    const checkboxes = document.querySelectorAll(`.${prefix}-perm`);
    checkboxes.forEach(cb => {
      const cat = cb.getAttribute('data-cat');
      const act = cb.getAttribute('data-act');
      if (perms[cat]) {
        perms[cat][act] = cb.checked;
      }
    });
    return perms;
  }

  static renderClientsList(prefix) {
    const clients = GlobalStore.getState().clients || [];
    const listDiv = document.getElementById(`${prefix}ClientsList`);
    if (!listDiv) return;
    
    listDiv.innerHTML = clients.map(c => `
      <div class="col-md-4 mb-1">
        <div class="form-check">
          <input class="form-check-input ${prefix}-client-cb" type="checkbox" value="${c.Client_ID}" id="${prefix}_client_${c.Client_ID}">
          <label class="form-check-label small" for="${prefix}_client_${c.Client_ID}">${c.Name} <span class="text-muted">(${c.Client_ID})</span></label>
        </div>
      </div>
    `).join('');
  }

  static toggleAllClients(prefix) {
    const isChecked = document.getElementById(`${prefix}AllowedAll`).checked;
    document.querySelectorAll(`.${prefix}-client-cb`).forEach(cb => cb.checked = isChecked);
  }

  static getAllowedClientsString(prefix) {
    const isAllChecked = document.getElementById(`${prefix}AllowedAll`).checked;
    if (isAllChecked) return "ALL";
    
    const checked = [];
    document.querySelectorAll(`.${prefix}-client-cb:checked`).forEach(cb => checked.push(cb.value));
    return JSON.stringify(checked);
  }

  static setAllowedClientsCheckboxes(prefix, allowedStr) {
    const allCb = document.getElementById(`${prefix}AllowedAll`);
    if (!allowedStr) {
      allCb.checked = false;
      document.querySelectorAll(`.${prefix}-client-cb`).forEach(cb => cb.checked = false);
      return;
    }
    
    if (allowedStr.toUpperCase().trim() === 'ALL') {
      allCb.checked = true;
      document.querySelectorAll(`.${prefix}-client-cb`).forEach(cb => cb.checked = true);
      return;
    }

    allCb.checked = false;
    let allowedArr = [];
    try {
      allowedArr = JSON.parse(allowedStr);
    } catch (e) {
      allowedArr = allowedStr.split(',').map(s => s.trim());
    }
    document.querySelectorAll(`.${prefix}-client-cb`).forEach(cb => {
      cb.checked = allowedArr.includes(cb.value);
    });
  }

  static showAddModal() {
    document.getElementById('addUserForm').reset();
    document.getElementById('nuRole').value = 'Viewer';
    this.handleRoleChange('nu'); // set default viewer permissions
    this.renderClientsList('nu');
    this.setAllowedClientsCheckboxes('nu', '');
    new bootstrap.Modal(document.getElementById('addUserModal')).show();
  }

  static async addUser() {
    const userData = {
      Name: document.getElementById('nuName').value.trim(),
      Username: document.getElementById('nuUsername').value.trim(),
      Password: document.getElementById('nuPassword').value,
      Role: document.getElementById('nuRole').value,
      Allowed_Clients: this.getAllowedClientsString('nu'),
      Is_Active: true,
      Is_Deleted: false,
      Permissions: this.getCheckboxesState('nu')
    };

    UIManager.showLoader("جاري إضافة المستخدم...");
    try {
      const adminEmail = GlobalStore.getState().currentUser.username;
      const newUser = await ApiClient.call('api_addUser', userData, adminEmail);
      
      const updatedUsers = [...GlobalStore.getState().users, newUser];
      GlobalStore.setState({ users: updatedUsers });
      
      bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
      this.renderTable();
      UIManager.showSuccess("تم إضافة المستخدم بنجاح");
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static showEditModal(userId) {
    const users = GlobalStore.getState().users || [];
    const user = users.find(u => u.User_ID == userId);
    if (!user) return;

    document.getElementById('euId').value = user.User_ID;
    document.getElementById('euName').value = user.Name;
    document.getElementById('euUsername').value = user.Username;
    document.getElementById('euRole').value = user.Role;
    
    this.renderClientsList('eu');
    this.setAllowedClientsCheckboxes('eu', user.Allowed_Clients || '');
    
    // Set permissions from user object if available, else fallback to role defaults
    if (user.Permissions && typeof user.Permissions === 'object' && Object.keys(user.Permissions).length > 0) {
      this.setCheckboxes('eu', user.Permissions);
    } else {
      this.handleRoleChange('eu');
    }

    new bootstrap.Modal(document.getElementById('editUserModal')).show();
  }

  static async updateUser() {
    const userId = document.getElementById('euId').value;
    const userData = {
      Name: document.getElementById('euName').value.trim(),
      Username: document.getElementById('euUsername').value.trim(),
      Role: document.getElementById('euRole').value,
      Allowed_Clients: this.getAllowedClientsString('eu'),
      Permissions: this.getCheckboxesState('eu')
    };

    UIManager.showLoader("جاري حفظ التعديلات...");
    try {
      const adminEmail = GlobalStore.getState().currentUser.username;
      const success = await ApiClient.call('api_updateUser', userId, userData, adminEmail);
      
      if (success) {
        const updatedUsers = GlobalStore.getState().users.map(u => {
           if (u.User_ID == userId) return { ...u, ...userData };
           return u;
        });
        GlobalStore.setState({ users: updatedUsers });
        bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
        this.renderTable();
        UIManager.showSuccess("تم تعديل المستخدم بنجاح");
      }
    } catch (e) {
      UIManager.showError(e.message);
    }
  }

  static async resetPasswordPrompt() {
    const newPassword = prompt("أدخل كلمة المرور الجديدة للمستخدم:");
    if (!newPassword || newPassword.trim() === '') return;
    
    const userId = document.getElementById('euId').value;
    UIManager.showLoader("جاري تحديث كلمة المرور...");
    try {
      const adminEmail = GlobalStore.getState().currentUser.username;
      await ApiClient.call('api_updateUser', userId, { Password: newPassword.trim() }, adminEmail);
      UIManager.showSuccess("تم تغيير كلمة المرور بنجاح");
    } catch (e) {
      UIManager.showError("حدث خطأ أثناء تغيير كلمة المرور");
    }
  }

  static async confirmDelete(userId) {
    const isConfirmed = await UIManager.confirmAction("هل أنت متأكد أنك تريد إيقاف/حذف هذا الحساب؟", "تأكيد الحذف");
    if (isConfirmed) {
      UIManager.showLoader("جاري الإيقاف...");
      try {
        const adminEmail = GlobalStore.getState().currentUser.username;
        // Soft delete sets Is_Deleted = true in the backend
        await ApiClient.call('api_deleteUser', userId, adminEmail);
        
        const updatedUsers = GlobalStore.getState().users.map(u => {
           if (u.User_ID == userId) return { ...u, Is_Deleted: true, Is_Active: false };
           return u;
        });
        GlobalStore.setState({ users: updatedUsers });
        this.renderTable();
        UIManager.showSuccess("تم إيقاف الحساب بنجاح");
      } catch (e) {
        UIManager.showError(e.message);
      }
    }
  }
}

UserController.defaultPermissions = {
  Admin: {
    dashboard: { view: true, viewKPIs: true },
    clients: { add: true, edit: true, delete: true },
    records: { add: true, edit: true, delete: true },
    attachments: { upload: true, download: true, print: true, delete: true },
    recycleBin: { view: true, restoreOwn: true, restoreAll: true, empty: true },
    admin: { manageUsers: true, manageTemplates: true, viewLogs: true },
    tags: { add: true, edit: true, delete: true },
    legalEntities: { add: true, edit: true, delete: true },
    tasks: { manageTasks: true, myTasks: true },
    credentials: { view: true, add: true, edit: true, delete: true }
  },
  User: {
    dashboard: { view: false, viewKPIs: false },
    clients: { add: true, edit: true, delete: false },
    records: { add: true, edit: true, delete: false },
    attachments: { upload: true, download: true, print: true, delete: false },
    recycleBin: { view: false, restoreOwn: true, restoreAll: false, empty: false },
    admin: { manageUsers: false, manageTemplates: false, viewLogs: false },
    tags: { add: true, edit: true, delete: false },
    legalEntities: { add: true, edit: false, delete: false },
    tasks: { manageTasks: false, myTasks: true },
    credentials: { view: false, add: false, edit: false, delete: false }
  },
  Viewer: {
    dashboard: { view: false, viewKPIs: false },
    clients: { add: false, edit: false, delete: false },
    records: { add: false, edit: false, delete: false },
    attachments: { upload: false, download: true, print: true, delete: false },
    recycleBin: { view: false, restoreOwn: false, restoreAll: false, empty: false },
    admin: { manageUsers: false, manageTemplates: false, viewLogs: false },
